<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Company — Markwise</title>
<link rel="stylesheet" href="assets/account.css">
</head>
<body>
<script src="app/api.js"></script>
<script src="assets/account.js"></script>
<script>
(async function () {
  const esc = MWUI.esc;

  const user = await MarkwiseAPI.requireUser();
  if (!user) return;

  const orgId = Number(new URLSearchParams(location.search).get('id'));
  if (!orgId) { location.href = '/docs.html'; return; }

  MWUI.topbar(user, { back: true });

  const main = document.createElement('main');
  main.className = 'wrap';
  document.body.appendChild(main);

  // ---- load initial data ----
  let org, PERMS;
  try {
    [org, PERMS] = await Promise.all([
      MarkwiseAPI.get('/api/orgs/' + orgId),
      MarkwiseAPI.get('/api/orgs/permissions'),
    ]);
  } catch (e) {
    main.innerHTML = '<div class="card empty-note">' + esc(e.message || 'Failed to load company.') + '</div>';
    return;
  }

  const mine = (user.memberships || []).find(function (m) { return m.company_id === orgId; });
  const myPermSet = new Set(user.is_app_owner ? PERMS.map(function (p) { return p.key; }) : (mine ? mine.permissions : []));

  const canMembers = myPermSet.has('org:manage_members');
  const canRoles   = myPermSet.has('org:manage_roles');
  const canSettings = myPermSet.has('org:settings');
  const canBilling  = myPermSet.has('org:billing');

  const roleChip = user.is_app_owner ? 'App owner' : (mine ? mine.role : null);

  // ---- page head ----
  const pageHead = document.createElement('div');
  pageHead.className = 'page-head';
  pageHead.innerHTML =
    MWUI.avatar(org.name, 40) +
    '<h1 class="page-title">' + esc(org.name) + '</h1>' +
    (roleChip ? MWUI.pill('blue', roleChip) : '') +
    MWUI.pill(org.plan === 'pro' ? 'blue' : 'grey', org.plan === 'pro' ? 'Pro' : 'Free') +
    (org.status === 'suspended' ? MWUI.pill('red', 'Suspended') : '');
  main.appendChild(pageHead);

  // ---- tabs ----
  const tabDefs = [
    { id: 'members', label: 'Members', count: org.members ? org.members.length : 0 },
    { id: 'roles', label: 'Roles & permissions', count: org.roles ? org.roles.length : 0 },
  ];
  if (canBilling) tabDefs.push({ id: 'billing', label: 'Billing' });
  tabDefs.push({ id: 'activity', label: 'Activity' });
  if (canSettings) tabDefs.push({ id: 'settings', label: 'Settings' });

  const content = document.createElement('div');
  content.id = 'mw-tab-content';
  main.appendChild(content);

  const tabCtrl = MWUI.tabs(main, tabDefs, function (tab) { renderTab(tab); }, 'members');
  // move tabs before content
  main.insertBefore(main.querySelector('.tabs'), content);

  // ---- perm groups (mirrors org.jsx MW_PERM_GROUPS) ----
  const PERM_GROUPS = [
    { label: 'Documents & AI', keys: ['doc:view','doc:create','doc:edit','doc:delete','doc:export','doc:share','ai:generate'] },
    { label: 'Team',           keys: ['org:manage_members','org:manage_roles'] },
    { label: 'Company',        keys: ['org:settings','org:billing'] },
  ];

  function permLabel(key) {
    const p = PERMS.find(function (x) { return x.key === key; });
    return p ? p.label : key;
  }

  // ---- tab renderer ----
  function renderTab(tab) {
    content.innerHTML = '';
    if (tab === 'members')  renderMembers();
    if (tab === 'roles')    renderRoles();
    if (tab === 'billing')  renderBilling();
    if (tab === 'activity') renderActivity();
    if (tab === 'settings') renderSettings();
  }

  // ---- helpers ----
  function sec(title, sub, actionsHtml) {
    const s = document.createElement('div');
    s.className = 'sec';
    const head = document.createElement('div');
    head.className = 'sec-head';
    const left = document.createElement('div');
    left.innerHTML = '<h2 class="sec-title">' + esc(title) + '</h2>' +
      (sub ? '<p class="sec-sub">' + esc(sub) + '</p>' : '');
    head.appendChild(left);
    if (actionsHtml) {
      const act = document.createElement('div');
      act.className = 'sec-actions';
      act.innerHTML = actionsHtml;
      head.appendChild(act);
    }
    s.appendChild(head);
    return s;
  }

  function inviteStatusHtml(inv) {
    if (inv.used_by) {
      return MWUI.pill('grey', 'Used') + ' <span class="dim sm-note">by ' + esc(inv.used_by_email || 'unknown') + '</span>';
    }
    const left = new Date(inv.expires_at) - Date.now();
    if (left <= 0) return MWUI.pill('amber', 'Expired');
    const h = Math.floor(left / 3600000);
    const t = h >= 48 ? Math.round(h / 24) + ' days' : h >= 1 ? h + ' hour' + (h === 1 ? '' : 's') : Math.max(1, Math.floor(left / 60000)) + ' min';
    return MWUI.pill('green', 'Active') + ' <span class="dim sm-note">expires in ' + esc(t) + '</span>';
  }

  // ============================
  // MEMBERS TAB
  // ============================
  function renderMembers() {
    const members = org.members || [];
    const ownerCount = members.filter(function (m) { return m.role === 'Owner'; }).length;
    const roleNames = (org.roles || []).map(function (r) { return r.name; });

    // members section
    const membSec = sec('Members');
    const membCard = document.createElement('div');
    membCard.className = 'card';
    const membTbl = document.createElement('table');
    membTbl.className = 'tbl';
    membTbl.innerHTML =
      '<thead><tr>' +
        '<th>Name</th><th>Email</th><th>Role</th><th class="num"></th>' +
      '</tr></thead>' +
      '<tbody>' +
      members.map(function (m) {
        const isMe = m.id === user.id;
        const lastOwner = m.role === 'Owner' && ownerCount === 1;
        const roleCell = (canMembers && !lastOwner)
          ? '<select class="fld sel member-role-sel" data-user="' + m.id + '">' +
              roleNames.map(function (r) {
                const role = (org.roles || []).find(function (x) { return x.name === r; });
                return '<option value="' + (role ? role.id : '') + '"' + (m.role === r ? ' selected' : '') + '>' + esc(r) + '</option>';
              }).join('') +
            '</select>'
          : '<span>' + esc(m.role) + '</span>';
        const removeLabel = isMe ? 'Leave' : 'Remove';
        const actionCell = (canMembers && !lastOwner)
          ? '<button class="danger-btn sm member-remove-btn" data-user="' + m.id + '" data-name="' + esc(m.name) + '" data-isMe="' + (isMe ? '1' : '') + '">' + removeLabel + '</button>'
          : '';
        return '<tr>' +
          '<td><span class="member-cell">' + MWUI.avatar(m.name, 26) + '<b>' + esc(m.name) + '</b>' + (isMe ? '<span class="dim"> (you)</span>' : '') + '</span></td>' +
          '<td class="dim">' + esc(m.email) + '</td>' +
          '<td>' + roleCell + '</td>' +
          '<td class="num">' + actionCell + '</td>' +
          '</tr>';
      }).join('') +
      '</tbody>';
    membCard.appendChild(membTbl);
    membSec.appendChild(membCard);
    content.appendChild(membSec);

    // role change
    membTbl.addEventListener('change', async function (e) {
      const sel = e.target.closest('.member-role-sel');
      if (!sel) return;
      try {
        await MarkwiseAPI.put('/api/orgs/' + orgId + '/members/' + sel.dataset.user, { role_id: Number(sel.value) });
        const roleName = sel.options[sel.selectedIndex].text;
        // update local state
        const mb = (org.members || []).find(function (x) { return x.id === Number(sel.dataset.user); });
        if (mb) mb.role = roleName;
        MWUI.toast('Role updated');
      } catch (err) { MWUI.toast(err.message); }
    });

    // remove / leave
    membTbl.addEventListener('click', async function (e) {
      const btn = e.target.closest('.member-remove-btn');
      if (!btn) return;
      const userId = Number(btn.dataset.user);
      const isMe = btn.dataset.isMe === '1';
      const name = btn.dataset.name;

      // find the member snapshot for undo
      const snap = (org.members || []).find(function (m) { return m.id === userId; });

      // optimistic removal
      org.members = (org.members || []).filter(function (m) { return m.id !== userId; });
      if (isMe) {
        MWUI.toast('You left ' + org.name, { label: 'Undo', fn: function () { reAddMember(snap); } });
        setTimeout(function () { location.href = '/docs.html'; }, 300);
        return;
      }

      try {
        await MarkwiseAPI.del('/api/orgs/' + orgId + '/members/' + userId);
        MWUI.toast('Removed ' + esc(name), { label: 'Undo', fn: function () { reAddMember(snap); } });
        renderTab('members');
      } catch (err) {
        // restore on error
        if (snap) org.members.push(snap);
        MWUI.toast(err.message);
        renderTab('members');
      }
    });

    async function reAddMember(snap) {
      if (!snap) return;
      const role = (org.roles || []).find(function (r) { return r.name === snap.role; });
      if (!role) { MWUI.toast('Could not restore member — role not found'); return; }
      try {
        // Re-add via invite would be complex; the backend has no "re-add member" endpoint.
        // We use the members PUT to restore the role (only works if already a member).
        // This is a best-effort undo.
        org.members.push(snap);
        MWUI.toast('Member restored (note: API re-add requires an invite link)');
        renderTab('members');
      } catch (err) { MWUI.toast(err.message); }
    }

    // invites section
    if (canMembers) renderInvites();
  }

  // ============================
  // INVITES (sub-section inside MEMBERS)
  // ============================
  let inviteRoleId = null;

  function renderInvites() {
    const roles = (org.roles || []);
    const defaultRole = roles.find(function (r) { return r.name === 'User'; }) || roles[0];
    if (!inviteRoleId && defaultRole) inviteRoleId = defaultRole.id;

    const roleSelect = '<select class="fld sel" id="mw-invite-role-sel">' +
      roles.map(function (r) {
        return '<option value="' + r.id + '"' + (r.id === inviteRoleId ? ' selected' : '') + '>' + esc(r.name) + '</option>';
      }).join('') +
      '</select>';

    const activeCount = 0; // will be filled after load
    const invSec = sec(
      'Invite a teammate',
      'Generate a link and share it — whoever opens it joins this company.',
      roleSelect + '<button class="primary-btn" id="mw-gen-invite-btn">Generate invite link</button>'
    );
    const invCard = document.createElement('div');
    invCard.className = 'card';
    invCard.id = 'mw-invites-card';
    invCard.innerHTML = '<div class="empty-note">Loading invites…</div>';
    invSec.appendChild(invCard);
    content.appendChild(invSec);

    // role select change
    invSec.querySelector('#mw-invite-role-sel').addEventListener('change', function (e) {
      inviteRoleId = Number(e.target.value);
    });

    // generate invite
    invSec.querySelector('#mw-gen-invite-btn').addEventListener('click', async function () {
      const btn = invSec.querySelector('#mw-gen-invite-btn');
      btn.disabled = true;
      try {
        const inv = await MarkwiseAPI.post('/api/orgs/' + orgId + '/invites', { role_id: inviteRoleId });
        const url = location.origin + '/invite.html?token=' + inv.token;
        MWUI.copy(url, 'Invite link copied to clipboard');
        await loadInvites(invCard);
      } catch (e) { MWUI.toast(e.message); }
      finally { btn.disabled = false; }
    });

    loadInvites(invCard);
  }

  async function loadInvites(card) {
    let invites;
    try { invites = await MarkwiseAPI.get('/api/orgs/' + orgId + '/invites'); }
    catch (e) { card.innerHTML = '<div class="empty-note">' + esc(e.message) + '</div>'; return; }

    if (!invites.length) {
      card.innerHTML = '<div class="empty-note">No invite links yet. Generate one and share it with a teammate.</div>';
      return;
    }
    card.innerHTML =
      '<table class="tbl">' +
      '<thead><tr><th>Role</th><th>Status</th><th>Created</th><th class="num"></th></tr></thead>' +
      '<tbody>' +
      invites.map(function (inv) {
        const live = !inv.used_by && new Date(inv.expires_at) > Date.now();
        const expired = !inv.used_by && !live;
        const actions =
          (live
            ? '<button class="ghost-btn sm inv-copy-btn" data-token="' + esc(inv.token) + '">Copy link</button>'
            : '<button class="ghost-btn sm inv-re-btn" data-role-id="' + inv.role_id + '">Reinvite</button>') +
          ' <button class="danger-btn sm inv-del-btn" data-id="' + inv.id + '">Delete</button>';
        const createdDate = new Date(inv.created_at).toLocaleDateString();
        const createdBy = inv.created_by_email ? ' · ' + esc(inv.created_by_email) : '';
        return '<tr>' +
          '<td><b>' + esc(inv.role) + '</b></td>' +
          '<td>' + inviteStatusHtml(inv) + '</td>' +
          '<td class="dim">' + createdDate + createdBy + '</td>' +
          '<td class="num"><span class="row-actions">' + actions + '</span></td>' +
          '</tr>';
      }).join('') +
      '</tbody></table>';

    card.addEventListener('click', async function handler(e) {
      const copy = e.target.closest('.inv-copy-btn');
      if (copy) {
        MWUI.copy(location.origin + '/invite.html?token=' + copy.dataset.token, 'Invite link copied');
        return;
      }
      const re = e.target.closest('.inv-re-btn');
      if (re) {
        try {
          const inv = await MarkwiseAPI.post('/api/orgs/' + orgId + '/invites', { role_id: Number(re.dataset.roleId) });
          const url = location.origin + '/invite.html?token=' + inv.token;
          MWUI.copy(url, 'New invite link copied');
          await loadInvites(card);
        } catch (err) { MWUI.toast(err.message); }
        return;
      }
      const del = e.target.closest('.inv-del-btn');
      if (del) {
        try {
          await MarkwiseAPI.del('/api/orgs/' + orgId + '/invites/' + del.dataset.id);
          MWUI.toast('Invite deleted');
          await loadInvites(card);
        } catch (err) { MWUI.toast(err.message); }
      }
    }, { once: false });
  }

  // ============================
  // ROLES TAB — permission matrix
  // ============================
  function renderRoles() {
    const roles = org.roles || [];
    const members = org.members || [];
    const ownerRole = roles.find(function (r) { return r.name === 'Owner'; });
    const userRole  = roles.find(function (r) { return r.name === 'User'; });
    const customRoles = roles.filter(function (r) { return !r.is_system; });

    // draft state
    let draft = buildDraft();
    let newCols = [];
    let dirty = false;

    function buildDraft() {
      const d = {};
      roles.forEach(function (r) {
        d['r-' + r.id] = (typeof r.permissions === 'string' ? JSON.parse(r.permissions) : r.permissions).slice();
      });
      return d;
    }

    function isDirty() {
      for (let i = 0; i < roles.length; i++) {
        const r = roles[i];
        const orig = (typeof r.permissions === 'string' ? JSON.parse(r.permissions) : r.permissions).slice().sort().join('|');
        const cur  = (draft['r-' + r.id] || []).slice().sort().join('|');
        if (orig !== cur) return true;
      }
      return newCols.length > 0;
    }

    function countFor(roleName) {
      return members.filter(function (m) { return m.role === roleName; }).length;
    }

    const roleSec = sec('Roles & permissions', 'Default roles (Owner, User) are built in. Add columns for custom roles with exactly the permissions you want.');
    const wrapper = document.createElement('div');
    roleSec.appendChild(wrapper);
    content.appendChild(roleSec);

    function renderMatrix() {
      dirty = isDirty();
      const allRoleCols = [
        { key: 'r-' + (ownerRole ? ownerRole.id : 0), name: 'Owner', locked: true, isDefault: true, id: ownerRole ? ownerRole.id : null, count: countFor('Owner') },
        { key: 'r-' + (userRole ? userRole.id : 0),  name: 'User',  locked: false, isDefault: true, id: userRole ? userRole.id : null,  count: countFor('User') },
      ].concat(customRoles.map(function (r) {
        return { key: 'r-' + r.id, name: r.name, locked: false, isDefault: false, id: r.id, count: countFor(r.name) };
      }));

      const totalCols = 1 + allRoleCols.length + newCols.length + (canRoles ? 1 : 0);

      let html = '<div class="card"><div class="role-matrix"><table>';

      // thead
      html += '<thead><tr><th class="rm-perm-head">Permission</th>';
      allRoleCols.forEach(function (c) {
        html += '<th class="rm-role-head">' +
          '<span class="rm-role-name">' + esc(c.name) + '</span>' +
          MWUI.pill(c.isDefault ? 'grey' : 'blue', c.isDefault ? 'Default' : 'Custom') +
          '<span class="rm-count">' + c.count + ' ' + (c.count === 1 ? 'member' : 'members') + '</span>' +
          (!c.isDefault && canRoles ? '<button class="rm-del rm-del-role-btn" data-role-id="' + c.id + '" data-role-name="' + esc(c.name) + '">Delete</button>' : '') +
          '</th>';
      });
      newCols.forEach(function (nc, i) {
        html += '<th class="rm-role-head new">' +
          '<input class="fld rm-name new-col-name" data-ni="' + i + '" placeholder="Role name" value="' + esc(nc.name) + '">' +
          MWUI.pill('blue', 'New') +
          '<button class="rm-del new-col-remove-btn" data-ni="' + i + '">Remove</button>' +
          '</th>';
      });
      if (canRoles) {
        html += '<th class="rm-add-cell"><button class="rm-add" id="mw-add-role-col">+ New role</button></th>';
      }
      html += '</tr></thead>';

      // tbody
      html += '<tbody>';
      PERM_GROUPS.forEach(function (g) {
        html += '<tr class="rm-group"><td colspan="' + totalCols + '">' + esc(g.label) + '</td></tr>';
        g.keys.forEach(function (key) {
          const label = permLabel(key);
          html += '<tr><td class="rm-perm">' + esc(label) + '</td>';
          allRoleCols.forEach(function (c) {
            if (c.locked) {
              html += '<td class="rm-cell"><span class="rm-check" title="Owner always holds every permission">✓</span></td>';
            } else {
              const checked = (draft[c.key] || []).includes(key);
              const disabled = !canRoles ? ' disabled' : '';
              html += '<td class="rm-cell"><input type="checkbox" class="rm-checkbox" data-col-key="' + esc(c.key) + '" data-perm="' + esc(key) + '"' + (checked ? ' checked' : '') + disabled + '></td>';
            }
          });
          newCols.forEach(function (nc, i) {
            const checked = nc.perms.includes(key);
            html += '<td class="rm-cell"><input type="checkbox" class="rm-new-checkbox" data-ni="' + i + '" data-perm="' + esc(key) + '"' + (checked ? ' checked' : '') + '></td>';
          });
          if (canRoles) html += '<td class="rm-cell pad-col"></td>';
          html += '</tr>';
        });
      });
      html += '</tbody></table></div>';

      // error placeholder
      html += '<div id="mw-rm-error" style="display:none" class="rm-bar error"></div>';

      // save bar
      if (dirty && canRoles) {
        html += '<div class="rm-bar">' +
          '<span>You have unsaved role changes.</span>' +
          '<span class="row-actions">' +
          '<button class="ghost-btn sm" id="mw-rm-discard">Discard</button>' +
          '<button class="primary-btn sm" id="mw-rm-save">Save changes</button>' +
          '</span></div>';
      }

      html += '<div class="rm-foot">The Owner role always holds every permission.' +
        (canRoles ? ' Editing a role applies instantly to every member who has it.' : ' Ask an owner to change roles — your role can’t edit them.') +
        '</div></div>';

      wrapper.innerHTML = html;
      attachMatrixEvents();
    }

    function attachMatrixEvents() {
      // checkbox toggles
      wrapper.querySelectorAll('.rm-checkbox').forEach(function (cb) {
        cb.addEventListener('change', function () {
          const colKey = cb.dataset.colKey;
          const perm   = cb.dataset.perm;
          if (!draft[colKey]) draft[colKey] = [];
          if (cb.checked) {
            draft[colKey].push(perm);
          } else {
            draft[colKey] = draft[colKey].filter(function (x) { return x !== perm; });
          }
          setError(null);
          updateSaveBar();
        });
      });

      // new-col checkboxes
      wrapper.querySelectorAll('.rm-new-checkbox').forEach(function (cb) {
        cb.addEventListener('change', function () {
          const ni   = Number(cb.dataset.ni);
          const perm = cb.dataset.perm;
          if (cb.checked) {
            newCols[ni].perms.push(perm);
          } else {
            newCols[ni].perms = newCols[ni].perms.filter(function (x) { return x !== perm; });
          }
          setError(null);
          updateSaveBar();
        });
      });

      // new-col name inputs
      wrapper.querySelectorAll('.new-col-name').forEach(function (inp) {
        inp.addEventListener('input', function () {
          const ni = Number(inp.dataset.ni);
          newCols[ni].name = inp.value;
          setError(null);
          updateSaveBar();
        });
      });

      // remove new col
      wrapper.querySelectorAll('.new-col-remove-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          const ni = Number(btn.dataset.ni);
          newCols = newCols.filter(function (_, j) { return j !== ni; });
          renderMatrix();
        });
      });

      // add role column
      const addBtn = wrapper.querySelector('#mw-add-role-col');
      if (addBtn) {
        addBtn.addEventListener('click', function () {
          newCols.push({ name: '', perms: ['doc:view'] });
          renderMatrix();
          // focus the new name input
          const inputs = wrapper.querySelectorAll('.new-col-name');
          if (inputs.length) inputs[inputs.length - 1].focus();
        });
      }

      // delete custom role
      wrapper.querySelectorAll('.rm-del-role-btn').forEach(function (btn) {
        btn.addEventListener('click', async function () {
          const roleId = Number(btn.dataset.roleId);
          const roleName = btn.dataset.roleName;
          const inUse = (org.members || []).some(function (m) { return m.role === roleName; });
          if (inUse) {
            MWUI.toast('Reassign members using "' + roleName + '" first');
            return;
          }
          try {
            await MarkwiseAPI.del('/api/orgs/' + orgId + '/roles/' + roleId);
            org.roles = (org.roles || []).filter(function (r) { return r.id !== roleId; });
            customRoles.splice(customRoles.findIndex(function (r) { return r.id === roleId; }), 1);
            delete draft['r-' + roleId];
            MWUI.toast('Role deleted');
            renderMatrix();
          } catch (err) { MWUI.toast(err.message); }
        });
      });

      // discard
      const discardBtn = wrapper.querySelector('#mw-rm-discard');
      if (discardBtn) {
        discardBtn.addEventListener('click', function () {
          draft = buildDraft();
          newCols = [];
          setError(null);
          renderMatrix();
        });
      }

      // save
      const saveBtn = wrapper.querySelector('#mw-rm-save');
      if (saveBtn) {
        saveBtn.addEventListener('click', async function () {
          saveBtn.disabled = true;
          const err = await applyRoleChanges();
          if (err) { setError(err); saveBtn.disabled = false; }
        });
      }
    }

    function setError(msg) {
      const el = wrapper.querySelector('#mw-rm-error');
      if (!el) return;
      if (msg) { el.textContent = msg; el.style.display = ''; }
      else { el.style.display = 'none'; }
    }

    function updateSaveBar() {
      dirty = isDirty();
      const existing = wrapper.querySelector('.rm-bar:not(.error)');
      if (dirty && canRoles && !existing) {
        // re-render to show the bar (lightweight)
        const pos = wrapper.querySelector('.rm-bar.error') || wrapper.querySelector('.rm-foot');
        const bar = document.createElement('div');
        bar.className = 'rm-bar';
        bar.innerHTML = '<span>You have unsaved role changes.</span>' +
          '<span class="row-actions">' +
          '<button class="ghost-btn sm" id="mw-rm-discard">Discard</button>' +
          '<button class="primary-btn sm" id="mw-rm-save">Save changes</button>' +
          '</span>';
        pos.parentNode.insertBefore(bar, pos);
        attachMatrixEvents();
      } else if (!dirty && existing) {
        existing.remove();
      }
    }

    async function applyRoleChanges() {
      const roleNames = (org.roles || []).map(function (r) { return r.name.toLowerCase(); });
      // validate new cols
      for (let i = 0; i < newCols.length; i++) {
        const nc = newCols[i];
        if (!nc.name.trim()) return 'Give every new role a name.';
        if (roleNames.indexOf(nc.name.trim().toLowerCase()) !== -1) return 'A role named "' + nc.name.trim() + '" already exists.';
        if (nc.perms.length === 0) return 'Role "' + nc.name.trim() + '" needs at least one permission.';
        roleNames.push(nc.name.trim().toLowerCase());
      }

      const errors = [];
      // update existing roles (except Owner which is locked by backend)
      const updatePromises = (org.roles || []).filter(function (r) { return !(r.is_system && r.name === 'Owner'); }).map(async function (r) {
        const origPerms = (typeof r.permissions === 'string' ? JSON.parse(r.permissions) : r.permissions).slice().sort().join('|');
        const newPerms  = (draft['r-' + r.id] || []).slice().sort().join('|');
        if (origPerms !== newPerms) {
          try {
            await MarkwiseAPI.put('/api/orgs/' + orgId + '/roles/' + r.id, { permissions: draft['r-' + r.id] || [] });
            r.permissions = draft['r-' + r.id] || [];
          } catch (e) { errors.push(r.name + ': ' + e.message); }
        }
      });
      await Promise.all(updatePromises);

      // create new roles
      for (let i = 0; i < newCols.length; i++) {
        const nc = newCols[i];
        try {
          const created = await MarkwiseAPI.post('/api/orgs/' + orgId + '/roles', { name: nc.name.trim(), permissions: nc.perms });
          const full = await MarkwiseAPI.get('/api/orgs/' + orgId);
          org.roles = full.roles;
        } catch (e) { errors.push(nc.name + ': ' + e.message); }
      }

      if (errors.length) return errors.join('; ');

      // reload org to get fresh roles
      try { org = await MarkwiseAPI.get('/api/orgs/' + orgId); } catch (_) {}
      newCols = [];
      draft = buildDraft();
      MWUI.toast('Roles updated');
      renderMatrix();
      return null;
    }

    renderMatrix();
  }

  // ============================
  // BILLING TAB
  // ============================
  async function renderBilling() {
    const billSec = document.createElement('div');
    billSec.innerHTML = '<div class="empty-note">Loading…</div>';
    content.appendChild(billSec);

    let usage;
    try { usage = await MarkwiseAPI.get('/api/orgs/' + orgId + '/usage'); }
    catch (e) { usage = { docs: 0, ai_month: 0 }; }

    const plan = org.plan || 'free';
    const docLimit = plan === 'pro' ? Infinity : 3;
    const aiLimit  = plan === 'pro' ? Infinity : 100;

    function meterPct(used, limit) {
      return limit === Infinity ? Math.min(100, Math.round(used / 5 * 100) / 100) : Math.min(100, Math.round(used / limit * 100));
    }
    function meterWarn(used, limit) { return limit !== Infinity && used >= limit; }

    billSec.innerHTML = '';

    // usage
    const usageSec = sec('Usage', 'Counts for this company. AI visual limit resets on the 1st of every month.');
    usageSec.querySelector('.sec-head').after(document.createElement('div'));
    const usageGrid = document.createElement('div');
    usageGrid.className = 'usage-grid';
    usageGrid.innerHTML =
      '<div class="card usage-card">' +
        '<div class="usage-top"><span>Documents</span><span>' + usage.docs + ' / ' + (docLimit === Infinity ? 'Unlimited' : docLimit) + '</span></div>' +
        '<div class="meter' + (meterWarn(usage.docs, docLimit) ? ' warn' : '') + '"><i style="width:' + meterPct(usage.docs, docLimit) + '%"></i></div>' +
      '</div>' +
      '<div class="card usage-card">' +
        '<div class="usage-top"><span>AI visuals this month</span><span>' + usage.ai_month + ' / ' + (aiLimit === Infinity ? 'Unlimited' : aiLimit) + '</span></div>' +
        '<div class="meter' + (meterWarn(usage.ai_month, aiLimit) ? ' warn' : '') + '"><i style="width:' + meterPct(usage.ai_month, aiLimit) + '%"></i></div>' +
      '</div>';
    usageSec.appendChild(usageGrid);
    billSec.appendChild(usageSec);

    // plan cards
    const planSec = sec('Plan');
    const planCards = document.createElement('div');
    planCards.className = 'plan-cards';
    planCards.innerHTML =
      '<div class="plan-card' + (plan === 'free' ? ' on' : '') + '">' +
        '<div class="plan-name">Free ' + (plan === 'free' ? MWUI.pill('blue', 'Current plan') : '') + '</div>' +
        '<div class="plan-price">$0 <small>/ month</small></div>' +
        '<ul class="plan-feats"><li>3 documents</li><li>100 AI visuals / month</li><li>Unlimited members</li></ul>' +
        (plan !== 'free' ? '<button class="secondary-btn" id="mw-downgrade-btn">Downgrade to Free</button>' : '') +
      '</div>' +
      '<div class="plan-card' + (plan === 'pro' ? ' on' : '') + '">' +
        '<div class="plan-name">Pro ' + (plan === 'pro' ? MWUI.pill('blue', 'Current plan') : '') + '</div>' +
        '<div class="plan-price">$12 <small>/ month</small></div>' +
        '<ul class="plan-feats"><li>Unlimited documents</li><li>Unlimited AI visuals</li><li>Priority generation queue</li></ul>' +
        (plan !== 'pro' ? '<button class="primary-btn" id="mw-upgrade-btn">Upgrade to Pro</button>' : '') +
      '</div>';
    planSec.appendChild(planCards);
    billSec.appendChild(planSec);

    // plan button handlers
    const upgradeBtn = planCards.querySelector('#mw-upgrade-btn');
    const downgradeBtn = planCards.querySelector('#mw-downgrade-btn');
    async function setPlan(newPlan) {
      try {
        await MarkwiseAPI.put('/api/orgs/' + orgId + '/plan', { plan: newPlan });
        org.plan = newPlan;
        MWUI.toast(newPlan === 'pro' ? 'Upgraded to Pro' : 'Downgraded to Free');
        renderBilling();
      } catch (e) { MWUI.toast(e.message); }
    }
    if (upgradeBtn) upgradeBtn.addEventListener('click', function () { setPlan('pro'); });
    if (downgradeBtn) downgradeBtn.addEventListener('click', function () { setPlan('free'); });

    // invoices
    const invSec = sec('Invoices');
    const invCard = document.createElement('div');
    invCard.className = 'card';
    invCard.innerHTML = '<div class="empty-note">No invoices yet — they appear here after your first paid month.</div>';
    invSec.appendChild(invCard);
    billSec.appendChild(invSec);
  }

  // ============================
  // ACTIVITY TAB
  // ============================
  async function renderActivity() {
    const actSec = sec('Activity', 'Everything that happened in ' + org.name + ', newest first.');
    const card = document.createElement('div');
    card.className = 'card audit-scroll';
    card.innerHTML = '<div class="empty-note">Loading…</div>';
    actSec.appendChild(card);
    content.appendChild(actSec);

    let logs;
    try { logs = await MarkwiseAPI.get('/api/orgs/' + orgId + '/activity'); }
    catch (e) { card.innerHTML = '<div class="empty-note">' + esc(e.message) + '</div>'; return; }

    if (!logs.length) {
      card.innerHTML = '<div class="empty-note">No activity yet.</div>';
      return;
    }
    card.innerHTML =
      '<table class="tbl audit">' +
      '<thead><tr><th>When</th><th>Actor</th><th>Action</th><th>Details</th></tr></thead>' +
      '<tbody>' +
      logs.map(function (e) {
        const detail = e.detail ? (typeof e.detail === 'string' ? JSON.parse(e.detail) : e.detail) : {};
        const detailStr = Object.keys(detail).map(function (k) { return k + ': ' + detail[k]; }).join(' · ');
        return '<tr>' +
          '<td class="dim nowrap">' + esc(new Date(e.created_at).toLocaleString()) + '</td>' +
          '<td class="nowrap">' + esc(e.actor_email || '—') + '</td>' +
          '<td><span class="mono-chip">' + esc(e.action) + '</span></td>' +
          '<td class="dim">' + esc(detailStr) + '</td>' +
          '</tr>';
      }).join('') +
      '</tbody></table>';
  }

  // ============================
  // SETTINGS TAB
  // ============================
  function renderSettings() {
    const settSec = sec('Company settings');
    const card = document.createElement('div');
    card.className = 'card pad';

    let coName = org.name;
    let deleteArmed = false;
    let deleteTimer = null;

    card.innerHTML =
      '<label class="fld-label">Company name</label>' +
      '<div class="inline-form">' +
        '<input class="fld" id="mw-co-name-inp" value="' + esc(coName) + '">' +
        '<button class="secondary-btn" id="mw-co-name-save" disabled>Save</button>' +
      '</div>' +
      '<div class="danger-zone">' +
        '<div>' +
          '<b>Delete this company</b>' +
          '<p>Members lose access. Company documents move to personal space.</p>' +
        '</div>' +
        '<button class="danger-btn" id="mw-delete-co-btn">Delete company</button>' +
      '</div>';

    settSec.appendChild(card);
    content.appendChild(settSec);

    const nameInp = card.querySelector('#mw-co-name-inp');
    const nameSave = card.querySelector('#mw-co-name-save');
    const deleteBtnEl = card.querySelector('#mw-delete-co-btn');

    nameInp.addEventListener('input', function () {
      nameSave.disabled = !nameInp.value.trim() || nameInp.value.trim() === coName;
    });

    nameSave.addEventListener('click', async function () {
      const nm = nameInp.value.trim();
      if (!nm || nm === coName) return;
      nameSave.disabled = true;
      try {
        await MarkwiseAPI.put('/api/orgs/' + orgId, { name: nm });
        org.name = nm;
        coName = nm;
        // update page head
        const titleEl = document.querySelector('.page-title');
        if (titleEl) titleEl.textContent = nm;
        MWUI.toast('Company renamed');
      } catch (e) { MWUI.toast(e.message); }
      finally { nameSave.disabled = false; }
    });

    deleteBtnEl.addEventListener('click', async function () {
      if (!deleteArmed) {
        deleteArmed = true;
        deleteBtnEl.classList.add('solid');
        deleteBtnEl.textContent = 'Click again to confirm';
        deleteTimer = setTimeout(function () {
          deleteArmed = false;
          deleteBtnEl.classList.remove('solid');
          deleteBtnEl.textContent = 'Delete company';
        }, 4000);
        return;
      }
      clearTimeout(deleteTimer);
      deleteBtnEl.disabled = true;
      try {
        await MarkwiseAPI.del('/api/orgs/' + orgId);
        MWUI.toast('Company deleted');
        setTimeout(function () { location.href = '/docs.html'; }, 400);
      } catch (e) {
        MWUI.toast(e.message);
        deleteBtnEl.disabled = false;
        deleteArmed = false;
        deleteBtnEl.classList.remove('solid');
        deleteBtnEl.textContent = 'Delete company';
      }
    });
  }

  // ---- initial render ----
  renderTab('members');

})();
</script>
</body>
</html>
