<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Markwise — Write. Visualize. Present.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f5f2;
    --surface: #ffffff;
    --ink: #211f1c;
    --grey: #6f6a61;
    --hairline: #e7e4df;
    --accent: oklch(0.50 0.16 262);
    --accent-deep: oklch(0.33 0.10 262);
    --accent-soft: oklch(0.962 0.016 262);
    --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body { font-family: var(--font); background: var(--bg); color: var(--ink); }
  #root, .app { height: 100vh; display: flex; flex-direction: column; }
  ::selection { background: oklch(0.88 0.06 262); }
  button { font-family: var(--font); cursor: pointer; }
  .primary-btn, .secondary-btn, .ghost-btn, .danger-btn, .cv-ctl, .space-toggle button { white-space: nowrap; }
  input { font-family: var(--font); }

  /* ---------- topbar ---------- */
  .topbar {
    height: 54px; flex: 0 0 54px; background: var(--surface);
    border-bottom: 1px solid var(--hairline);
    display: flex; align-items: center; gap: 20px; padding: 0 18px; z-index: 20;
  }
  .brand { display: flex; align-items: center; gap: 9px; }
  .brand-mark { width: 14px; height: 14px; background: var(--accent); transform: rotate(45deg); border-radius: 3px; }
  .brand-name { font-weight: 700; font-size: 16px; letter-spacing: -0.2px; }
  .doc-title {
    flex: 0 1 340px; border: 1px solid transparent; border-radius: 8px;
    font-size: 13.5px; font-weight: 500; color: var(--ink); padding: 7px 10px; background: transparent;
  }
  .doc-title:hover { border-color: var(--hairline); }
  .doc-title:focus { outline: none; border-color: var(--accent); background: #fff; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }
  .topbar-right .save-state { font-size: 11.5px; margin-right: 2px; }
  .topbar-sep { width: 1px; height: 20px; background: var(--hairline); margin: 0 4px; }
  .topbar-icon { position: relative; font-size: 14px; }
  .topbar-icon.on { background: var(--accent-soft); color: var(--accent); }
  .topbar-badge {
    position: absolute; top: -2px; right: -3px; min-width: 14px; height: 14px; padding: 0 3px;
    background: var(--accent); color: #fff; font-size: 9px; font-weight: 700; line-height: 14px;
    border-radius: 8px; text-align: center;
  }
  .more-wrap { position: relative; }
  .more-menu {
    position: absolute; top: 34px; right: 0; z-index: 60; min-width: 168px; padding: 5px;
    background: #fff; border: 1px solid var(--hairline); border-radius: 10px; box-shadow: 0 10px 30px rgba(20,18,14,.16);
  }
  .more-item {
    display: block; width: 100%; text-align: left; background: none; border: none;
    padding: 8px 10px; font-size: 13px; color: var(--ink); border-radius: 7px; text-decoration: none; cursor: pointer;
  }
  .more-item:hover { background: var(--bg); }
  .more-item.danger { color: #b3422f; }
  .more-div { height: 1px; background: var(--hairline); margin: 5px 2px; }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%; background: var(--accent-deep); color: #fff;
    display: grid; place-items: center; font-size: 12.5px; font-weight: 700;
  }

  /* ---------- buttons ---------- */
  .primary-btn {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 8px 16px; font-size: 13px; font-weight: 600; transition: filter .15s;
  }
  .primary-btn:hover { filter: brightness(1.1); }
  .secondary-btn {
    background: #fff; color: var(--ink); border: 1px solid var(--hairline); border-radius: 8px;
    padding: 8px 16px; font-size: 13px; font-weight: 600;
  }
  .secondary-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ghost-btn {
    background: transparent; color: var(--grey); border: 1px solid var(--hairline);
    border-radius: 8px; padding: 7px 12px; font-size: 12.5px; font-weight: 500;
  }
  .ghost-btn:hover:not(:disabled) { color: var(--accent); border-color: var(--accent); }
  .ghost-btn:disabled { opacity: .5; cursor: default; }
  .ghost-btn.sm { padding: 5px 10px; font-size: 12px; }
  .danger-btn {
    background: transparent; color: #b3422f; border: 1px solid #ecd8d3; border-radius: 8px;
    padding: 8px 14px; font-size: 13px; font-weight: 600;
  }
  .danger-btn:hover { background: #fdf3f1; }
  .icon-btn {
    background: transparent; border: none; color: var(--grey); font-size: 13px;
    width: 28px; height: 28px; border-radius: 7px; display: grid; place-items: center;
  }
  .icon-btn:hover { background: var(--bg); color: var(--ink); }
  .icon-btn.sm { width: 22px; height: 22px; font-size: 11px; }
  .icon-btn:disabled { opacity: .35; cursor: default; }

  /* ---------- layout ---------- */
  .main { flex: 1; display: flex; min-height: 0; }
  .doc-scroll { flex: 1; overflow-y: auto; min-width: 0; }
  .sheet {
    max-width: 840px; margin: 36px auto 120px; background: var(--surface);
    border: 1px solid var(--hairline); border-radius: 14px; position: relative;
    padding: 64px 84px 96px; box-shadow: 0 1px 2px rgba(30,28,24,.04), 0 12px 40px -18px rgba(30,28,24,.10);
  }
  /* ---------- A4 page-break markers ---------- */
  .page-marks { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
  .page-mark { position: absolute; left: 0; right: 0; border-top: 1.5px dashed #c8c3ba; }
  .page-mark-label {
    position: absolute; right: 10px; top: -9px; background: var(--surface);
    color: #b0aaa0; font-size: 10px; font-weight: 700; letter-spacing: .4px;
    text-transform: uppercase; padding: 0 7px; line-height: 18px;
  }
  /* inline code / code block / comment marks inside text blocks */
  .tb .mw-code { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: .9em; background: #f1efea; border: 1px solid var(--hairline); border-radius: 5px; padding: 1px 5px; }
  .tb .mw-pre { display: block; font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 13px; background: #f7f6f3; border: 1px solid var(--hairline); border-radius: 8px; padding: 12px 14px; margin: 10px 0; white-space: pre-wrap; }
  .tb mark.cmt { background: #fdf0c8; border-bottom: 2px solid #e7c14d; border-radius: 2px; cursor: pointer; transition: background .15s; }
  .tb mark.cmt.active { background: #fbe39a; border-bottom-color: #d9a429; }
  .tb mark.cmt.resolved { background: transparent; border-bottom: 1px solid #d8d3c8; }
  .tb mark.cmt.flash { animation: cmt-flash .9s ease-out; }
  @keyframes cmt-flash { 0% { background: #ffe07a; } 100% { background: #fdf0c8; } }

  /* soft lock — a collaborator is editing this block */
  .tb.blk-locked { position: relative; box-shadow: inset 0 0 0 1.5px rgba(80,120,220,.35); border-radius: 4px; }
  .tb.blk-locked::after {
    content: attr(data-locked-by) ' editing'; position: absolute; top: -8px; right: 6px;
    font-size: 9.5px; font-weight: 700; color: #fff; background: #5273dc; padding: 1px 6px;
    border-radius: 8px; letter-spacing: .2px; pointer-events: none; white-space: nowrap;
  }

  /* presence avatars in the topbar */
  .presence-stack { display: flex; align-items: center; margin-right: 4px; }
  .presence-ava {
    width: 24px; height: 24px; border-radius: 50%; background: #5273dc; color: #fff;
    font-size: 11px; font-weight: 700; display: grid; place-items: center; border: 2px solid var(--surface, #fff);
    margin-left: -6px; box-shadow: 0 1px 2px rgba(0,0,0,.12);
  }
  .presence-ava:first-child { margin-left: 0; }
  .presence-ava.more { background: #8a8578; }

  /* mini comment bar for whole-section selections */
  .fmtbar.fmtbar-mini { padding: 4px; }
  .fmt-btn.fmt-comment { display: inline-flex; align-items: center; gap: 6px; width: auto; padding: 0 10px; }

  /* floating margin cards (Google-Docs style) anchored next to each section.
     The page stays centered; cards sit in the right margin beside it. */
  .doc-scroll { position: relative; }
  .cmt-float {
    position: absolute; width: 276px; z-index: 6;
    background: #fff; border: 1px solid var(--hairline); border-radius: 10px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06); transition: top .16s ease, left .16s ease, box-shadow .16s ease;
  }
  .cmt-float.active { box-shadow: 0 8px 28px rgba(0,0,0,.14); border-color: var(--accent, #2f6df0); }
  .cmt-float .cmt-thread { border: none; box-shadow: none; padding: 10px 11px; }
  .cmt-float .cmt-thread.active { box-shadow: none; }
  .cmt-thread.compact { padding: 9px 11px; }
  .cmt-thread.compact .cmt-text { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .cmt-more { font-size: 11px; color: var(--grey); margin-top: 5px; padding-left: 34px; }

  /* comments rail */
  .comments-rail { width: 300px; flex: 0 0 300px; }
  .cmt-count { display: inline-grid; place-items: center; min-width: 17px; height: 17px; padding: 0 4px;
    background: var(--accent, #2f6df0); color: #fff; font-size: 10.5px; border-radius: 9px; margin-left: 4px; }
  .cmt-list { padding: 10px 12px 24px; display: flex; flex-direction: column; gap: 10px; }
  .cmt-empty { color: var(--grey); font-size: 12.5px; text-align: center; padding: 28px 10px; }
  .cmt-empty-hint { font-size: 11.5px; opacity: .8; margin-top: 6px; }
  .cmt-thread {
    border: 1px solid var(--hairline); border-radius: 10px; padding: 10px 11px; background: #fff;
    cursor: pointer; transition: box-shadow .15s, border-color .15s;
  }
  .cmt-thread:hover { border-color: #d3cec3; }
  .cmt-thread.active { border-color: var(--accent, #2f6df0); box-shadow: 0 0 0 2px rgba(47,109,240,.12); }
  .cmt-thread.resolved { opacity: .62; }
  .cmt-thread.draft { border-color: var(--accent, #2f6df0); border-style: dashed; }
  .cmt-quote {
    font-size: 11.5px; color: #8a8578; border-left: 3px solid #e7c14d; padding: 1px 0 1px 8px;
    margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .cmt-row { display: flex; gap: 8px; margin-top: 8px; }
  .cmt-row:first-of-type { margin-top: 0; }
  .cmt-row.reply { padding-left: 8px; border-left: 2px solid var(--hairline); margin-left: 4px; }
  .cmt-ava { flex: 0 0 26px; width: 26px; height: 26px; border-radius: 50%; background: #5273dc; color: #fff;
    font-size: 11px; font-weight: 700; display: grid; place-items: center; }
  .cmt-ava.sm, .cmt-ava.xs { width: 20px; height: 20px; flex-basis: 20px; font-size: 10px; }
  .cmt-body { flex: 1; min-width: 0; }
  .cmt-meta { display: flex; align-items: center; gap: 6px; font-size: 11.5px; }
  .cmt-meta b { font-size: 12px; }
  .cmt-time { color: var(--grey); }
  .cmt-del { margin-left: auto; border: none; background: none; color: #b3aea4; cursor: pointer; font-size: 11px; padding: 2px 4px; border-radius: 4px; }
  .cmt-del:hover { background: #f3f0ea; color: #b3422f; }
  .cmt-text { font-size: 13px; line-height: 1.45; color: var(--ink); white-space: pre-wrap; word-break: break-word; margin-top: 1px; }
  .cmt-thread-actions { display: flex; gap: 4px; margin-top: 8px; }
  .cmt-composer { margin-top: 8px; position: relative; }
  .cmt-ta { width: 100%; border: 1px solid var(--hairline); border-radius: 8px; padding: 8px 9px; font-size: 13px;
    font-family: inherit; resize: vertical; color: var(--ink); background: #fff; }
  .cmt-ta:focus { outline: none; border-color: var(--accent, #2f6df0); }
  .cmt-actions { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
  .cmt-hint { margin-left: auto; font-size: 10px; color: #b3aea4; }
  .primary-btn.xs, .ghost-btn.xs { font-size: 11.5px; padding: 4px 10px; border-radius: 7px; }
  .cmt-mentions { position: absolute; left: 0; right: 0; top: 100%; z-index: 30; background: #fff;
    border: 1px solid var(--hairline); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,.12); overflow: hidden; margin-top: 2px; }
  .cmt-mention { display: flex; align-items: center; gap: 8px; width: 100%; padding: 7px 10px; border: none;
    background: none; cursor: pointer; font-size: 12.5px; text-align: left; }
  .cmt-mention:hover { background: #f3f0ea; }
  .cmt-resolved-sect { margin-top: 6px; }
  .cmt-resolved-toggle { border: none; background: none; color: var(--grey); font-size: 11.5px; font-weight: 600; cursor: pointer; padding: 6px 2px; }
  .tb ul, .tb ol { margin: 8px 0; padding-left: 26px; }
  .tb li { margin: 3px 0; }
  .tb blockquote { margin: 10px 0; padding: 2px 0 2px 16px; border-left: 3px solid var(--accent); color: var(--grey); font-style: italic; }
  .tb a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }

  /* ---------- text blocks ---------- */
  .tb { outline: none; caret-color: var(--accent); }
  .sheet .blk-sel { background: var(--accent-soft); box-shadow: 0 0 0 6px var(--accent-soft); border-radius: 4px; }
  .tb-h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; margin: 0 0 18px; line-height: 1.2; }
  .tb-h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.2px; margin: 38px 0 10px; line-height: 1.3; }
  .tb-p { font-size: 16px; line-height: 1.72; margin: 0 0 16px; color: #33302b; text-wrap: pretty; }
  .tb-p b { color: var(--ink); }

  /* ---------- visual blocks ---------- */
  .vis-block {
    position: relative; margin: 26px 0 30px; padding: 18px 14px 12px;
    border: 1.5px solid transparent; border-radius: 14px; transition: border-color .15s, box-shadow .15s;
    animation: pop-in .28s cubic-bezier(.2,.9,.3,1.2);
  }
  @keyframes pop-in { from { opacity: 0; transform: scale(.97) translateY(6px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) { .vis-block { animation: none; } }
  .vis-block:hover { border-color: var(--hairline); }
  .vis-block.selected { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .vis-block.dragging { opacity: .45; }
  /* drag-to-reorder handle */
  .vis-drag {
    position: absolute; top: -13px; left: 14px; z-index: 9; display: none;
    width: 26px; height: 22px; align-items: center; justify-content: center;
    background: var(--ink); color: #e8e5df; border: none; border-radius: 8px;
    cursor: grab; box-shadow: 0 4px 14px rgba(20,18,14,.25);
  }
  .vis-block:hover .vis-drag, .vis-block.selected .vis-drag { display: flex; }
  .vis-drag:active { cursor: grabbing; }
  body.no-select, body.no-select * { user-select: none !important; }
  /* drop indicator while reordering */
  .drop-line { height: 0; border-top: 2.5px solid var(--accent); margin: 4px 0; border-radius: 2px; box-shadow: 0 0 0 2px var(--accent-soft); }
  .vis-toolbar {
    position: absolute; top: -14px; right: 14px; display: none; gap: 2px;
    background: var(--ink); border-radius: 9px; padding: 3px; box-shadow: 0 4px 14px rgba(20,18,14,.25);
  }
  .vis-block:hover .vis-toolbar, .vis-block.selected .vis-toolbar { display: flex; }
  .vis-toolbar button {
    background: transparent; border: none; color: #e8e5df; font-size: 11.5px; font-weight: 600;
    padding: 5px 10px; border-radius: 6px;
  }
  .vis-toolbar button:hover { background: rgba(255,255,255,.14); color: #fff; }
  .vis-toolbar button.del:hover { background: #b3422f; }
  .style-pop {
    position: absolute; z-index: 40; right: 12px; top: 34px; min-width: 172px;
    background: #fff; border: 1px solid var(--hairline); border-radius: 14px; padding: 6px;
    display: flex; flex-direction: column; gap: 2px; box-shadow: 0 10px 30px rgba(20,18,14,.16);
  }
  .style-pop-btn {
    display: flex; align-items: center; gap: 9px; border: none; background: transparent;
    font-size: 12px; font-weight: 600; color: var(--ink); padding: 7px 10px; border-radius: 9px; text-align: left;
  }
  .style-pop-btn:hover { background: var(--paper-2, #f4f2ee); }
  .style-pop-btn.on { background: var(--accent-soft); }
  .style-pop-btn.more { color: var(--grey); font-weight: 500; border-top: 1px solid var(--hairline); border-radius: 0 0 9px 9px; margin-top: 3px; }
  .style-dot { width: 17px; height: 17px; border-radius: 50%; flex: 0 0 17px; }

  /* ---------- fab ---------- */
  .fab {
    position: fixed; transform: translate(-50%, -100%); z-index: 60;
    background: var(--ink); color: #fff; border: none; border-radius: 999px;
    padding: 9px 16px 9px 13px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 7px;
    box-shadow: 0 6px 20px rgba(20,18,14,.3); animation: fab-in .14s ease-out;
  }
  @keyframes fab-in { from { opacity: 0; transform: translate(-50%, calc(-100% + 5px)); } }
  .fab:hover { background: #000; }
  .fab-spark { color: oklch(0.78 0.12 262); font-size: 14px; }

  /* ---------- hint ---------- */
  .hint-pill {
    position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%); z-index: 40;
    background: var(--surface); border: 1px solid var(--hairline); border-radius: 999px;
    padding: 9px 12px 9px 18px; font-size: 13px; color: var(--grey);
    display: flex; align-items: center; gap: 10px; box-shadow: 0 8px 28px -8px rgba(30,28,24,.18);
  }
  .hint-pill b { color: var(--ink); font-weight: 600; }
  .hint-accent { color: var(--accent); font-weight: 600; }

  /* ---------- overlay & modals ---------- */
  .overlay {
    position: fixed; inset: 0; background: rgba(28,26,22,.42); z-index: 100;
    display: grid; place-items: center; padding: 28px; animation: fade-in .15s ease-out;
  }
  @keyframes fade-in { from { opacity: 0; } }
  .modal {
    background: var(--surface); border-radius: 18px; box-shadow: 0 24px 80px -20px rgba(20,18,14,.4);
    width: 100%; animation: modal-in .18s cubic-bezier(.2,.9,.3,1.1);
  }
  @keyframes modal-in { from { opacity: 0; transform: scale(.965) translateY(8px); } }
  .modal.picker { max-width: 880px; max-height: calc(100vh - 56px); display: flex; flex-direction: column; }
  .picker-head { display: flex; align-items: flex-start; justify-content: space-between; padding: 22px 24px 0; gap: 16px; }
  .modal-title { font-size: 18px; font-weight: 700; letter-spacing: -0.2px; }
  .modal-sub { font-size: 12.5px; color: var(--grey); margin-top: 5px; line-height: 1.5; max-width: 640px; }
  .picker-controls { display: flex; align-items: center; gap: 12px 18px; flex-wrap: wrap; padding: 16px 24px 14px; border-bottom: 1px solid var(--hairline); }
  .picker-controls .spacer { flex: 1; }
  .ai-tag { font-size: 11.5px; font-weight: 600; color: var(--accent); }
  .ai-tag.dim { color: var(--grey); }
  .picker-grid {
    overflow-y: auto; padding: 18px 24px 24px; display: grid;
    grid-template-columns: 1fr 1fr; gap: 14px; position: relative;
  }
  .opt-card {
    background: #fff; border: 1px solid var(--hairline); border-radius: 14px; padding: 12px 14px 8px;
    text-align: left; transition: border-color .15s, box-shadow .15s, transform .15s;
  }
  .opt-card:hover { border-color: var(--accent); box-shadow: 0 8px 24px -12px rgba(50,60,140,.25); transform: translateY(-1px); }
  .opt-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .opt-name { font-size: 12.5px; font-weight: 700; color: var(--ink); }
  .badge {
    font-size: 10px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase;
    background: var(--accent-soft); color: var(--accent); border-radius: 999px; padding: 3px 8px;
  }
  .opt-preview { pointer-events: none; }
  .opt-preview svg { max-height: 230px; }

  /* loading shimmer */
  .opt-card.shimmer { pointer-events: none; min-height: 170px; }
  .shimmer-bar, .shimmer-box { background: linear-gradient(100deg, #efedea 35%, #f8f7f5 50%, #efedea 65%); background-size: 240% 100%; animation: shim 1.2s infinite linear; border-radius: 6px; }
  .shimmer-bar { height: 12px; width: 40%; margin-bottom: 10px; }
  .shimmer-bar.w60 { width: 60%; }
  .shimmer-box { height: 120px; border-radius: 10px; }
  @keyframes shim { to { background-position: -140% 0; } }
  .loading-note { grid-column: 1 / -1; text-align: center; font-size: 13px; color: var(--grey); padding: 6px 0 2px; }
  .dots span { animation: blink 1.2s infinite; }
  .dots span:nth-child(2) { animation-delay: .2s; }
  .dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%, 60% { opacity: 1; } 30% { opacity: .2; } }

  /* ---------- segmented + swatches ---------- */
  .seg { display: inline-flex; background: var(--bg); border: 1px solid var(--hairline); border-radius: 9px; padding: 3px; gap: 2px; }
  .seg button {
    border: none; background: transparent; font-size: 12px; font-weight: 600; color: var(--grey);
    padding: 6px 11px; border-radius: 7px;
  }
  .seg button.on { background: #fff; color: var(--ink); box-shadow: 0 1px 3px rgba(30,28,24,.12); }
  .panel .seg { display: flex; width: 100%; }
  .panel .seg button { flex: 1; padding: 6px 4px; }
  .swatches { display: flex; gap: 7px; flex-wrap: wrap; }
  .swatch { width: 22px; height: 22px; border-radius: 50%; border: 2px solid transparent; outline: 2px solid transparent; transition: outline-color .12s; }
  .swatch.multi { border-radius: 7px; }
  .swatch.on { outline-color: var(--ink); outline-offset: 2px; }

  /* ---------- edit panel ---------- */
  .panel {
    width: 318px; flex: 0 0 318px; background: var(--surface); border-left: 1px solid var(--hairline);
    display: flex; flex-direction: column; min-height: 0; animation: panel-in .18s ease-out;
  }
  @keyframes panel-in { from { transform: translateX(20px); opacity: 0; } }
  .panel-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--hairline); }
  .panel-title { font-size: 13.5px; font-weight: 700; }
  .panel-body { flex: 1; overflow-y: auto; padding: 14px 16px 20px; }
  .fld-label { display: block; font-size: 10.5px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; color: var(--grey); margin: 16px 0 7px; }
  .fld-label:first-child { margin-top: 2px; }
  .fld {
    width: 100%; border: 1px solid var(--hairline); border-radius: 8px; padding: 8px 10px;
    font-size: 13px; color: var(--ink); background: #fff;
  }
  .fld:focus { outline: none; border-color: var(--accent); }
  .fld.sm { font-size: 12px; padding: 6px 8px; }
  .fld.val { flex: 0 0 76px; }
  .type-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .layout-pick { background: #1d1b17; border-bottom: 1px solid rgba(255,255,255,.09); display: flex; flex-direction: column; max-height: 54vh; }
  .lay-head { display: flex; align-items: center; gap: 18px; padding: 11px 18px 10px; font-size: 12.5px; color: #f0ede6; border-bottom: 1px solid rgba(255,255,255,.07); flex: 0 0 auto; }
  .lay-head .lay-all { display: flex; align-items: center; gap: 6px; color: #b3aea4; font-size: 11.5px; font-weight: 600; cursor: pointer; }
  .lay-head .ghost-btn { border-color: rgba(255,255,255,.25); color: #d9d5cd; }
  .lay-head .ghost-btn:hover { border-color: #fff; color: #fff; }
  .lay-count { margin-left: auto; color: #8d8779; font-size: 11px; }
  .lay-body { display: flex; min-height: 0; flex: 1; }
  .lay-cats { flex: 0 0 178px; overflow-y: auto; padding: 10px 8px; display: flex; flex-direction: column; gap: 2px; border-right: 1px solid rgba(255,255,255,.07); }
  .lay-cats button { text-align: left; background: transparent; border: none; color: #b3aea4; font-size: 12px; font-weight: 600; padding: 8px 12px; border-radius: 8px; }
  .lay-cats button:hover { background: rgba(255,255,255,.07); color: #fff; }
  .lay-cats button.on { background: rgba(255,255,255,.13); color: #fff; }
  .lay-grid { flex: 1; overflow-y: auto; padding: 12px 16px 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(112px, 1fr)); gap: 10px; align-content: start; }
  .lay-chip {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    border: 1px solid rgba(255,255,255,.13); background: rgba(255,255,255,.04); border-radius: 10px; padding: 8px 6px 6px;
    font-size: 10.5px; font-weight: 600; color: #b3aea4;
  }
  .lay-chip span:last-child { max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lay-chip:hover { border-color: rgba(255,255,255,.45); color: #fff; }
  .lay-chip.on { border-color: #fff; color: #fff; background: rgba(255,255,255,.1); }
  .lay-thumb { position: relative; display: block; width: 92px; height: 52px; background: #fff; border-radius: 5px; overflow: hidden; flex: 0 0 auto; }
  .style-groups { display: flex; flex-direction: column; gap: 9px; }
  .style-group-label { font-size: 9.5px; font-weight: 700; letter-spacing: .7px; text-transform: uppercase; color: var(--grey); opacity: .75; margin-bottom: 4px; }
  .chip {
    border: 1px solid var(--hairline); background: #fff; border-radius: 999px;
    font-size: 11.5px; font-weight: 600; color: var(--grey); padding: 5px 11px;
  }
  .chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  .chip:hover:not(.on) { border-color: var(--accent); color: var(--accent); }
  .items-list { display: flex; flex-direction: column; gap: 10px; }
  .item-row { display: flex; gap: 6px; align-items: flex-start; }
  .item-inputs { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .item-sub { display: flex; gap: 5px; }
  .item-sub .fld:first-child { flex: 1; }
  .panel-foot { border-top: 1px solid var(--hairline); padding: 12px 16px; display: flex; flex-direction: column; gap: 9px; }
  .panel-foot .ghost-btn { width: 100%; }
  .panel-foot-row { display: flex; gap: 8px; }
  .panel-foot-row .primary-btn { flex: 1; }

  /* ---------- export & share ---------- */
  .modal.export-modal { max-width: 720px; }
  .export-preview { margin: 16px 24px; border: 1px solid var(--hairline); border-radius: 12px; padding: 14px; max-height: 50vh; overflow-y: auto; }
  .export-actions { display: flex; gap: 10px; padding: 0 24px 24px; }
  .modal.share-modal { max-width: 520px; }
  .share-row { display: flex; gap: 10px; padding: 18px 24px 6px; }
  .share-row .fld { color: var(--grey); }
  .share-note { font-size: 12px; color: var(--grey); padding: 8px 24px 22px; }
  .share-divider { height: 1px; background: var(--hairline); margin: 14px 24px 4px; }
  .share-people { padding: 6px 24px 2px; }
  /* the email form sits inside .share-people (already 24px padded) — drop the
     extra horizontal padding .share-row adds so the input aligns left. */
  .share-people .share-row { padding: 10px 0 6px; }
  .share-list { list-style: none; margin: 12px 0 4px; padding: 0; display: flex; flex-direction: column; gap: 2px; }
  .share-list li { display: flex; align-items: center; gap: 10px; padding: 7px 4px; border-radius: 8px; font-size: 13px; }
  .share-list li:hover { background: var(--bg); }
  .share-email { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .share-can { font-size: 11px; color: var(--grey); white-space: nowrap; }

  /* ---------- toast ---------- */
  .toast {
    position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%); z-index: 200;
    background: var(--ink); color: #fff; font-size: 13px; font-weight: 500;
    padding: 10px 18px; border-radius: 999px; box-shadow: 0 8px 24px rgba(20,18,14,.3);
    animation: fab-in .15s ease-out;
  }
  /* ---------- format toolbar ---------- */
  .fmtbar {
    position: fixed; transform: translate(-50%, -100%); z-index: 60;
    background: var(--ink); border-radius: 11px; padding: 4px;
    display: flex; align-items: center; gap: 2px;
    box-shadow: 0 6px 20px rgba(20,18,14,.3); animation: fab-in .14s ease-out;
  }
  .fmt-btn {
    background: transparent; border: none; color: #d9d5cd; font-size: 13px;
    width: 30px; height: 30px; border-radius: 7px; display: grid; place-items: center;
  }
  .fmt-btn:hover { background: rgba(255,255,255,.14); color: #fff; }
  .fmt-btn.on { background: rgba(255,255,255,.22); color: #fff; }
  .fmt-sep { width: 1px; height: 18px; background: rgba(255,255,255,.18); margin: 0 3px; }
  .fmt-count { color: rgba(255,255,255,.75); font-size: 12px; padding: 0 6px; white-space: nowrap; }
  .fmt-viz {
    background: transparent; border: none; color: #fff; border-radius: 8px;
    padding: 6px 12px 6px 8px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px;
  }
  .fmt-viz:hover { background: rgba(255,255,255,.14); }
  .fmt-btn svg { display: block; }
  .fmt-btn sub { font-size: 9px; font-weight: 700; }
  /* link / comment inline input state */
  .fmtbar-input { padding: 5px 6px; gap: 6px; }
  .fmt-input {
    background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); border-radius: 7px;
    color: #fff; font: inherit; font-size: 13px; padding: 6px 10px; width: 240px; outline: none;
  }
  .fmt-input::placeholder { color: rgba(255,255,255,.5); }
  .fmt-apply {
    background: var(--accent); border: none; color: #fff; border-radius: 7px;
    font-size: 12.5px; font-weight: 700; padding: 6px 12px; white-space: nowrap;
  }
  .fmt-apply:hover { filter: brightness(1.12); }
  /* ---------- left-margin Visualize affordance ---------- */
  .viz-fab {
    position: fixed; z-index: 60; width: 36px; height: 36px; border-radius: 50%;
    background: oklch(0.62 0.17 250); border: none; display: grid; place-items: center;
    box-shadow: 0 4px 14px -2px rgba(40,80,200,.5); animation: fab-in .14s ease-out;
    transform: translateY(-4px);
  }
  .viz-fab:hover { background: oklch(0.56 0.18 250); transform: translateY(-4px) scale(1.06); }

  /* ---------- picker categories ---------- */
  .picker-scroll { overflow-y: auto; padding: 6px 24px 24px; }
  .cat-label {
    font-size: 10.5px; font-weight: 700; letter-spacing: .7px; text-transform: uppercase;
    color: var(--grey); margin: 18px 0 9px; position: sticky; top: 0; background: var(--surface); padding: 6px 0 3px; z-index: 2;
  }
  .picker-grid.tight { overflow: visible; padding: 0; grid-template-columns: 1fr 1fr 1fr; gap: 11px; }
  .picker-grid.tight .opt-preview svg { max-height: 150px; }
  .picker-controls .type-grid { max-width: 480px; }

  /* ---------- edit panel additions ---------- */
  .drag-hint {
    font-size: 11.5px; line-height: 1.5; color: var(--grey);
    background: var(--accent-soft); border-radius: 9px; padding: 9px 11px; margin-bottom: 4px;
  }
  .cat-block { margin-bottom: 9px; }
  .cat-mini { font-size: 9.5px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; color: #aaa49a; margin: 0 0 5px; }
  .dot-row { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
  .cdot {
    width: 17px; height: 17px; border-radius: 50%; border: none; padding: 0;
    outline: 2px solid transparent; outline-offset: 1.5px; transition: outline-color .12s;
  }
  .cdot.on { outline-color: var(--ink); }
  .cdot.auto { background: #fff; border: 1px dashed #b9b4ab; color: var(--grey); font-size: 9px; font-weight: 700; display: grid; place-items: center; }
  .conn-rows { display: flex; flex-direction: column; gap: 7px; }
  .reset-pos { width: 100%; margin-top: 14px; }
  .note-ctl { display: flex; flex-direction: column; gap: 6px; }

  /* ---------- export ---------- */
  .export-preview.checker {
    background-image: linear-gradient(45deg, #eceae5 25%, transparent 25%, transparent 75%, #eceae5 75%), linear-gradient(45deg, #eceae5 25%, transparent 25%, transparent 75%, #eceae5 75%);
    background-size: 18px 18px; background-position: 0 0, 9px 9px;
  }
  .bg-toggle { display: flex; align-items: center; gap: 9px; padding: 0 26px 14px; font-size: 13px; color: var(--ink); cursor: pointer; }
  .bg-toggle input { accent-color: var(--accent); width: 15px; height: 15px; }
  .docx-actions { display: flex; flex-direction: column; gap: 10px; padding: 18px 24px 24px; }
  .docx-opt {
    display: flex; align-items: center; gap: 14px; text-align: left;
    background: #fff; border: 1px solid var(--hairline); border-radius: 12px; padding: 13px 16px;
    transition: border-color .15s;
  }
  .docx-opt:hover:not(:disabled) { border-color: var(--accent); }
  .docx-opt:disabled { opacity: .6; }
  .docx-ico {
    flex: 0 0 38px; width: 38px; height: 38px; border-radius: 10px; background: var(--accent-soft);
    color: var(--accent); display: grid; place-items: center; font-size: 17px; font-weight: 700;
  }
  .docx-opt b { display: block; font-size: 13.5px; color: var(--ink); }
  .docx-opt small { display: block; font-size: 11.5px; color: var(--grey); margin-top: 2px; }

  /* ---------- deck ---------- */
  .deck-root { position: fixed; inset: 0; z-index: 150; background: #14120f; display: flex; flex-direction: column; animation: fade-in .15s ease-out; }
  .deck-top { height: 52px; flex: 0 0 52px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid rgba(255,255,255,.09); }
  .deck-title { display: flex; align-items: center; gap: 10px; color: #f2f0ec; font-size: 13.5px; }
  .deck-meta { color: #8d8779; font-size: 12px; font-weight: 500; }
  .deck-actions { display: flex; align-items: center; gap: 9px; }
  .deck-actions .ghost-btn { border-color: rgba(255,255,255,.2); color: #d9d5cd; }
  .deck-actions .ghost-btn:hover:not(:disabled) { border-color: #fff; color: #fff; }
  .deck-actions .ghost-btn.ai-on { border-color: rgba(255,255,255,.65); color: #fff; }
  .deck-actions .icon-btn { color: #d9d5cd; }
  .deck-actions .icon-btn:hover { background: rgba(255,255,255,.12); color: #fff; }
  .theme-pick { background: #1d1b17; border-bottom: 1px solid rgba(255,255,255,.09); padding: 12px 18px 14px; display: flex; flex-direction: column; gap: 9px; }
  .theme-row { display: flex; align-items: center; gap: 14px; }
  .theme-row-name { width: 70px; font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: #8d8779; }
  .theme-swatches { display: flex; gap: 7px; flex-wrap: wrap; }
  .tswatch {
    width: 34px; height: 24px; border-radius: 6px; border: 1px solid rgba(255,255,255,.18);
    display: grid; place-items: center; padding: 0; outline: 2px solid transparent; outline-offset: 2px; transition: outline-color .12s;
  }
  .tswatch span { width: 14px; height: 8px; display: block; }
  .tswatch.on { outline-color: #fff; }
  .deck-main { flex: 1; display: flex; min-height: 0; }
  .deck-rail { width: 192px; flex: 0 0 192px; overflow-y: auto; padding: 14px 12px; display: flex; flex-direction: column; gap: 12px; border-right: 1px solid rgba(255,255,255,.09); }
  .thumb { position: relative; background: none; border: 2px solid rgba(255,255,255,.14); border-radius: 8px; padding: 3px; transition: border-color .12s; cursor: pointer; }
  .thumb.on { border-color: var(--accent); }
  .thumb.skipped { opacity: .38; }
  .thumb:hover { border-color: rgba(255,255,255,.45); }
  .thumb-tools {
    position: absolute; right: 3px; bottom: 3px; display: none; gap: 2px;
    background: rgba(0,0,0,.78); border-radius: 7px; padding: 2px;
  }
  .thumb:hover .thumb-tools { display: flex; }
  .thumb-tools button {
    background: transparent; border: none; color: #d9d5cd; width: 22px; height: 22px;
    border-radius: 5px; font-size: 12px; display: grid; place-items: center;
  }
  .thumb-tools button:hover:not(:disabled) { background: rgba(255,255,255,.18); color: #fff; }
  .thumb-tools button:disabled { opacity: .3; }
  .skip-badge {
    position: absolute; left: 50%; top: 12px; transform: translateX(-50%);
    background: rgba(0,0,0,.72); color: #f0ad4e; font-size: 12px; font-weight: 600;
    border-radius: 999px; padding: 6px 14px; white-space: nowrap;
  }
  .deck-print { display: none; }
  .thumb .slide-scaler { border-radius: 4px; overflow: hidden; pointer-events: none; }
  .thumb-n { position: absolute; left: -2px; top: -2px; background: rgba(0,0,0,.72); color: #fff; font-size: 10px; font-weight: 700; border-radius: 6px 0 6px 0; padding: 2px 7px; }
  .deck-stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; padding: 22px; min-width: 0; }
  .deck-stage .slide-scaler { box-shadow: 0 24px 80px -18px rgba(0,0,0,.7); border-radius: 6px; overflow: hidden; }
  .deck-nav { display: flex; align-items: center; gap: 16px; }
  /* ---------- deck build flow: generating + review ---------- */
  .deck-gen { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .deck-gen-card { width: 520px; max-width: 92vw; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); border-radius: 16px; padding: 26px 28px; color: #e8e5df; display: flex; flex-direction: column; gap: 14px; }
  .gen-head { display: flex; align-items: center; gap: 12px; font-size: 17px; }
  .gen-spinner { width: 16px; height: 16px; border-radius: 50%; border: 2.5px solid rgba(255,255,255,.25); border-top-color: #fff; animation: gen-spin .8s linear infinite; }
  @keyframes gen-spin { to { transform: rotate(360deg); } }
  .gen-sub { font-size: 13px; color: #b3aea4; line-height: 1.5; }
  .gen-list { display: flex; flex-direction: column; gap: 6px; max-height: 320px; overflow: auto; }
  .gen-row { display: flex; align-items: center; gap: 10px; font-size: 13.5px; padding: 7px 10px; border-radius: 8px; background: rgba(255,255,255,.04); color: #b3aea4; }
  .gen-row.done { color: #e8e5df; }
  .gen-dot { flex: 0 0 18px; width: 18px; height: 18px; border-radius: 50%; border: 1.5px dashed rgba(255,255,255,.3); font-size: 11px; display: flex; align-items: center; justify-content: center; }
  .gen-row.done .gen-dot { border: none; background: oklch(0.55 0.13 155); color: #fff; }
  .gen-vis { margin-left: auto; font-size: 11px; color: oklch(0.75 0.1 262); white-space: nowrap; }
  .gen-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .deck-gen .ghost-btn { align-self: flex-end; background: transparent; color: #d9d5cd; border-color: rgba(255,255,255,.22); }
  .deck-review { flex: 1; display: flex; min-height: 0; gap: 0; }
  .rev-stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 22px; min-width: 0; }
  .rev-stage .slide-scaler { box-shadow: 0 24px 80px -18px rgba(0,0,0,.7); border-radius: 6px; overflow: hidden; }
  .rev-vis-note { font-size: 12px; color: oklch(0.75 0.1 262); }
  .rev-form { flex: 0 0 360px; border-left: 1px solid rgba(255,255,255,.09); padding: 22px; display: flex; flex-direction: column; gap: 8px; overflow: auto; color: #e8e5df; }
  .rev-kind { font-size: 11.5px; text-transform: uppercase; letter-spacing: .8px; color: #8e897f; margin-bottom: 6px; }
  .rev-form label { font-size: 12px; color: #b3aea4; margin-top: 8px; }
  .rev-form input, .rev-form textarea { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.14); border-radius: 8px; color: #f2f0ec; font: inherit; font-size: 13.5px; padding: 8px 10px; outline: none; resize: vertical; }
  .rev-form input:focus, .rev-form textarea:focus { border-color: oklch(0.65 0.12 262); }
  .rev-remarks { margin-top: 10px; border: 1px dashed rgba(255,255,255,.18); border-radius: 10px; padding: 8px 12px; }
  .rev-remarks summary { cursor: pointer; font-size: 12.5px; color: #b3aea4; user-select: none; }
  .rev-remarks[open] summary { margin-bottom: 8px; }
  .rev-remarks textarea { width: 100%; box-sizing: border-box; }
  .rev-actions { margin-top: 10px; }
  .rev-actions .ghost-btn { background: transparent; color: #d9d5cd; border-color: rgba(255,255,255,.22); }
  .rev-actions .ghost-btn:disabled { opacity: .4; }
  .rev-nav { margin-top: auto; padding-top: 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .rev-nav .secondary-btn { background: transparent; color: #d9d5cd; border-color: rgba(255,255,255,.22); }
  .rev-nav .secondary-btn:disabled { opacity: .35; }
  .deck-nav .secondary-btn { background: transparent; color: #d9d5cd; border-color: rgba(255,255,255,.22); }
  .deck-nav .secondary-btn:hover:not(:disabled) { border-color: #fff; color: #fff; }
  .deck-nav .secondary-btn:disabled { opacity: .35; }
  .slide-scaler { position: relative; overflow: hidden; }
  .slide { position: absolute; left: 0; top: 0; transform-origin: 0 0; }
  .present-root { position: fixed; inset: 0; z-index: 300; background: #000; display: grid; place-items: center; cursor: pointer; }
  .present-count { position: fixed; bottom: 18px; right: 22px; color: rgba(255,255,255,.55); font-size: 13px; font-weight: 600; }
  .present-exit {
    position: fixed; top: 16px; right: 18px; background: rgba(255,255,255,.12); color: rgba(255,255,255,.8);
    border: none; border-radius: 999px; padding: 7px 14px; font-size: 12px; font-weight: 600;
  }
  .present-exit:hover { background: rgba(255,255,255,.24); color: #fff; }

  /* ---------- space toggle ---------- */
  .space-toggle { display: inline-flex; background: var(--bg); border: 1px solid var(--hairline); border-radius: 9px; padding: 3px; gap: 2px; }
  .space-toggle button {
    border: none; background: transparent; font-size: 12.5px; font-weight: 600; color: var(--grey);
    padding: 6px 14px; border-radius: 7px; font-family: var(--font);
  }
  .space-toggle button.on { background: #fff; color: var(--ink); box-shadow: 0 1px 3px rgba(30,28,24,.12); }
  .space-toggle button:hover:not(.on) { color: var(--ink); }

  /* ---------- canvas ---------- */
  .cv-surface {
    flex: 1; position: relative; overflow: hidden; min-width: 0; cursor: grab;
    background-color: #f1efea;
    background-image: radial-gradient(circle, rgba(33,31,28,.10) 1.3px, transparent 1.4px);
    background-size: 26px 26px;
  }
  .cv-surface:active { cursor: grabbing; }
  .cv-world { position: absolute; left: 0; top: 0; transform-origin: 0 0; will-change: transform; }
  .cv-card {
    position: absolute; background: var(--surface); border: 1px solid var(--hairline); border-radius: 14px;
    box-shadow: 0 1px 2px rgba(30,28,24,.04), 0 14px 36px -20px rgba(30,28,24,.22);
    cursor: grab; transition: box-shadow .15s, border-color .15s; overflow: hidden;
  }
  .cv-card:hover { border-color: #d7d3cc; box-shadow: 0 1px 2px rgba(30,28,24,.05), 0 20px 50px -22px rgba(30,28,24,.30); }
  .cv-card.sel { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft), 0 20px 50px -22px rgba(50,60,140,.32); }
