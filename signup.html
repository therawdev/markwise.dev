<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Create account — Markwise</title>
<link rel="stylesheet" href="assets/site.css">
</head>
<body>
<div class="auth-wrap">
  <form class="auth-card" id="form">
    <div class="brand"><span class="brand-mark"></span><span class="brand-name">Markwise</span></div>
    <h1>Create your account</h1>
    <p class="sub">Turn text into visuals in seconds</p>
    <label class="fld-label" for="name">Name</label>
    <input class="fld" id="name" autocomplete="name" required>
    <label class="fld-label" for="email">Email</label>
    <input class="fld" id="email" type="email" autocomplete="email" required>
    <label class="fld-label" for="password">Password (8+ characters)</label>
    <input class="fld" id="password" type="password" autocomplete="new-password" minlength="8" required>
    <div class="form-error" id="error"></div>
    <button class="primary-btn" type="submit">Create account</button>
    <div class="auth-alt">Already have an account? <a href="login.html">Sign in</a></div>
  </form>
</div>
<script src="app/api.js"></script>
<script>
  const form = document.getElementById('form');
  const errEl = document.getElementById('error');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errEl.textContent = '';
    try {
      await MarkwiseAPI.post('/api/auth/signup', {
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
      });
      // honor invite links carried through signup: ?invite=TOKEN
      const invite = new URLSearchParams(location.search).get('invite');
      if (invite) {
        try { await MarkwiseAPI.post('/api/orgs/invites/' + encodeURIComponent(invite) + '/accept'); } catch (e) { /* surfaced on docs page */ }
      }
      location.href = '/docs.html';
    } catch (e) {
      errEl.textContent = e.message;
    }
  });
</script>
</body>
</html>
