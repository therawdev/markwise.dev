<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Create account — Markwise</title>
<link rel="stylesheet" href="assets/account.css">
</head>
<body>
<div class="auth-stage" data-screen-label="Signup">
  <div class="auth-inner">
    <div class="auth-brand">
      <span class="brand-mark"></span>
      <span class="brand-name">Markwise</span>
    </div>
    <div class="auth-card" id="card">
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-sub">Have an invite link? Open it instead — you'll join your team automatically.</p>
      <form id="form">
        <label class="fld-label" for="name">Name</label>
        <input class="fld" id="name" autocomplete="name" placeholder="Your name" autofocus required>
        <label class="fld-label" for="email">Email</label>
        <input class="fld" id="email" type="email" autocomplete="email" placeholder="you@company.com" required>
        <label class="fld-label" for="password">Password</label>
        <input class="fld" id="password" type="password" autocomplete="new-password" minlength="8" placeholder="At least 8 characters" required>
        <div class="form-error" id="error" style="display:none"></div>
        <button class="primary-btn auth-submit" type="submit">Create account</button>
      </form>
      <div class="auth-alt">Already have an account? <a id="altLink" href="login.html">Sign in</a></div>
    </div>
  </div>
</div>
<script src="app/api.js"></script>
<script>
(async function () {
  const card = document.getElementById('card');
  const form = document.getElementById('form');
  const errEl = document.getElementById('error');
  const params = new URLSearchParams(location.search);
  const invite = params.get('invite');
  // keep ?next / ?invite when switching to sign-in
  document.getElementById('altLink').href = 'login.html' + location.search;

  // signup gate: invite links always work, public signups can be off
  if (!invite) {
    try {
      const p = await MarkwiseAPI.get('/api/platform');
      if (p.allow_signups === false) {
        card.innerHTML =
          '<h1 class="auth-title">Signups are invite-only</h1>' +
          '<p class="auth-sub">The app owner has turned off public signups. Invite links still work — ask a company owner to send you one.</p>' +
          '<a class="secondary-btn as-link" href="login.html">Go to sign in</a>';
        return;
      }
    } catch (e) { /* gate is enforced server-side anyway */ }
  }

  const showErr = (msg) => { errEl.textContent = msg; errEl.style.display = ''; };
  form.addEventListener('input', () => { errEl.style.display = 'none'; });
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errEl.style.display = 'none';
    try {
      const body = {
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
      };
      if (invite) body.invite_token = invite; // server accepts the invite atomically
      await MarkwiseAPI.post('/api/auth/signup', body);
      let next = params.get('next');
      if (invite && next) {
        // the single-use token was just consumed — drop it from the follow-up URL
        const u = new URL(next, location.origin);
        u.searchParams.delete('invite');
        next = u.pathname + u.search;
      }
      location.href = next && next.startsWith('/') ? next : '/docs.html';
    } catch (err) {
      showErr(err.message);
    }
  });
})();
</script>
</body>
</html>
