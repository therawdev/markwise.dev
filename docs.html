<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Documents — Markwise</title>
<link rel="stylesheet" href="assets/account.css">
</head>
<body>
<script src="app/api.js"></script>
<script src="assets/account.js"></script>
<script>
(async function () {
  const user = await MarkwiseAPI.requireUser();
  if (!user) return;

  // invite link flow: /docs.html?invite=TOKEN — preserve legacy behavior
  const invite = new URLSearchParams(location.search).get('invite');
  if (invite) {
    try {
      const r = await MarkwiseAPI.post('/api/orgs/invites/' + encodeURIComponent(invite) + '/accept');
      MWUI.toast('Joined ' + r.company.name);
    } catch (e) { MWUI.toast(e.message); }
    history.replaceState(null, '', '/docs.html');
  }

  MWUI.topbar(user, {});

  // ---- page state ----
  let allDocs = [];
  let trashDocs = [];
  let query = '';
  let sort = 'updated';
  let wsFilter = 'all';
  let starredOnly = false;
  let renamingId = null;
  let confirmDelId = null;

  // memberships that allow doc creation
  const createableMemberships = (user.memberships || []).filter((m) =>
    (m.permissions || []).includes('doc:create')
  );
  const editableMemberships = (user.memberships || []).filter((m) =>
    (m.permissions || []).includes('doc:edit')
  );
  const deletableMemberships = (user.memberships || []).filter((m) =>
    (m.permissions || []).includes('doc:delete')
  );

  // ---- helpers ----
  const canCreateInCompany = (companyId) => {
    if (companyId == null) return true; // personal
    return createableMemberships.some((m) => m.company_id === companyId);
  };
  const canEditDoc = (doc) => {
    if (doc.owner_id === user.id) return true;
    if (doc.company_id == null) return false;
    return editableMemberships.some((m) => m.company_id === doc.company_id);
  };
  const canDeleteDoc = (doc) => {
    if (doc.owner_id === user.id) return true;
    if (doc.company_id == null) return false;
    return deletableMemberships.some((m) => m.company_id === doc.company_id);
  };
  const wsName = (doc) => {
    if (!doc.company_id) return 'Personal';
    return MWUI.esc(doc.company_name || ('Company ' + doc.company_id));
  };

  // ---- layout ----
  const main = document.createElement('main');
  main.className = 'wrap';
  document.body.appendChild(main);

  // -------- DOCUMENTS SECTION --------
  const docsSection = document.createElement('div');
  docsSection.className = 'sec';
  main.appendChild(docsSection);

  const docSecHead = document.createElement('div');
  docSecHead.className = 'sec-head';
  docsSection.appendChild(docSecHead);

  const docSecTitle = document.createElement('h2');
  docSecTitle.className = 'sec-title';
  docSecTitle.textContent = 'Documents';
  docSecHead.appendChild(docSecTitle);

  const docSecActions = document.createElement('div');
  docSecActions.className = 'sec-actions invite-gen';
  docSecHead.appendChild(docSecActions);

  // workspace selector for new doc
  let newDocCompanyId = null;
  if ((user.memberships || []).length > 0) {
    const newDocSel = document.createElement('select');
    newDocSel.className = 'fld sel';
    newDocSel.title = 'Workspace for new documents';
    const personalOpt = document.createElement('option');
    personalOpt.value = '';
    personalOpt.textContent = 'Personal';
    newDocSel.appendChild(personalOpt);
    (user.memberships || []).forEach((m) => {
      if (!(m.permissions || []).includes('doc:create')) return;
      const o = document.createElement('option');
      o.value = String(m.company_id);
      o.textContent = m.company_name || ('Company ' + m.company_id);
      newDocSel.appendChild(o);
    });
    newDocSel.onchange = () => {
      newDocCompanyId = newDocSel.value ? Number(newDocSel.value) : null;
    };
    docSecActions.appendChild(newDocSel);
  }

  const newDocBtn = document.createElement('button');
  newDocBtn.className = 'primary-btn';
  newDocBtn.textContent = '+ New document';
  newDocBtn.onclick = async () => {
    if (!canCreateInCompany(newDocCompanyId)) {
      MWUI.toast('Your role can’t create documents here');
      return;
    }
    try {
      const doc = await MarkwiseAPI.post('/api/docs', {
        title: 'Untitled document',
        company_id: newDocCompanyId,
      });
      location.href = '/index.html?doc=' + doc.id;
    } catch (e) { MWUI.toast(e.message); }
  };
  docSecActions.appendChild(newDocBtn);

  // card with toolbar + table
  const docsCard = document.createElement('div');
  docsCard.className = 'card';
  docsSection.appendChild(docsCard);

  // toolbar
  const toolbar = document.createElement('div');
  toolbar.className = 'tbl-toolbar';
  docsCard.appendChild(toolbar);

  const searchInput = document.createElement('input');
  searchInput.className = 'fld search';
  searchInput.placeholder = 'Search documents…';
  searchInput.oninput = () => { query = searchInput.value; renderDocs(); };
  toolbar.appendChild(searchInput);

  const starChip = document.createElement('button');
  starChip.className = 'chip';
  starChip.title = 'Show starred only';
  starChip.textContent = '★ Starred';
  starChip.onclick = () => {
    starredOnly = !starredOnly;
    starChip.classList.toggle('on', starredOnly);
    renderDocs();
  };
  toolbar.appendChild(starChip);

  if ((user.memberships || []).length > 0) {
    const wsSel = document.createElement('select');
    wsSel.className = 'fld sel';
    const opts = [
      { value: 'all', label: 'All workspaces' },
      { value: 'personal', label: 'Personal' },
      ...(user.memberships || []).map((m) => ({ value: String(m.company_id), label: m.company_name || ('Company ' + m.company_id) })),
    ];
    opts.forEach((o) => {
      const el = document.createElement('option');
      el.value = o.value;
      el.textContent = o.label;
      wsSel.appendChild(el);
    });
    wsSel.onchange = () => { wsFilter = wsSel.value; renderDocs(); };
    toolbar.appendChild(wsSel);
  }

  const sortSel = document.createElement('select');
  sortSel.className = 'fld sel';
  [{ value: 'updated', label: 'Last updated' }, { value: 'title', label: 'Title A–Z' }].forEach((o) => {
    const el = document.createElement('option');
    el.value = o.value;
    el.textContent = o.label;
    sortSel.appendChild(el);
  });
  sortSel.onchange = () => { sort = sortSel.value; renderDocs(); };
  toolbar.appendChild(sortSel);

  const docsBody = document.createElement('div');
  docsCard.appendChild(docsBody);

  function renderDocs() {
    const q = query.trim().toLowerCase();
    const companyIds = (user.memberships || []).map((m) => m.company_id);

    let docs = allDocs
      .filter((d) => !q || (d.title || '').toLowerCase().includes(q))
      .filter((d) => {
        if (wsFilter === 'all') return true;
        if (wsFilter === 'personal') return !d.company_id;
        return d.company_id === parseInt(wsFilter, 10);
      })
      .filter((d) => !starredOnly || d.starred);

    // starred float to top, then sort
    docs = docs.slice().sort((a, b) =>
      (b.starred ? 1 : 0) - (a.starred ? 1 : 0) ||
      (sort === 'title'
        ? (a.title || '').localeCompare(b.title || '')
        : new Date(b.updated_at).getTime() - new Date(a.updated_at).getTime())
    );

    docsBody.innerHTML = '';

    if (docs.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-note';
      empty.textContent = allDocs.length === 0
        ? 'No documents yet. Create your first one.'
        : 'Nothing matches your search.';
      docsBody.appendChild(empty);
      return;
    }

    const tbl = document.createElement('table');
    tbl.className = 'tbl';
    tbl.innerHTML =
      '<thead><tr>' +
      '<th>Title</th><th>Workspace</th><th>Updated</th><th class="num"></th>' +
      '</tr></thead>';
    const tbody = document.createElement('tbody');
    tbl.appendChild(tbody);

    docs.forEach((doc) => {
      const tr = document.createElement('tr');
      tr.dataset.id = String(doc.id);

      // ---- Title cell ----
      const titleTd = document.createElement('td');
      const docCell = document.createElement('span');
      docCell.className = 'doc-cell';

      const starBtn = document.createElement('button');
      starBtn.className = 'star' + (doc.starred ? ' on' : '');
      starBtn.title = doc.starred ? 'Unstar' : 'Star';
      starBtn.textContent = doc.starred ? '★' : '☆';
      starBtn.onclick = async () => {
        try {
          await MarkwiseAPI.put('/api/docs/' + doc.id, { starred: !doc.starred });
          doc.starred = !doc.starred;
          renderDocs();
        } catch (e) { MWUI.toast(e.message); }
      };
      docCell.appendChild(starBtn);

      if (renamingId === doc.id) {
        const inp = document.createElement('input');
        inp.className = 'fld sel wide';
        inp.value = doc.title || '';
        inp.autofocus = true;
        const saveRename = async () => {
          const title = inp.value.trim() || 'Untitled document';
          try {
            await MarkwiseAPI.put('/api/docs/' + doc.id, { title });
            doc.title = title;
          } catch (e) { MWUI.toast(e.message); }
          renamingId = null;
          renderDocs();
        };
        inp.onblur = saveRename;
        inp.onkeydown = (e) => {
          if (e.key === 'Enter') { e.preventDefault(); inp.onblur = null; saveRename(); }
          if (e.key === 'Escape') { renamingId = null; renderDocs(); }
        };
        docCell.appendChild(inp);
        // focus after render
        setTimeout(() => inp.focus(), 0);
      } else {
        const a = document.createElement('a');
        a.className = 'doc-link';
        a.href = '/index.html?doc=' + doc.id;
        a.textContent = doc.title || 'Untitled document';
        docCell.appendChild(a);
      }
      titleTd.appendChild(docCell);
      tr.appendChild(titleTd);

      // ---- Workspace cell ----
      const wsTd = document.createElement('td');
      const wsChip = document.createElement('span');
      wsChip.className = 'ws-chip';
      wsChip.textContent = doc.company_id ? (doc.company_name || 'Company ' + doc.company_id) : 'Personal';
      wsTd.appendChild(wsChip);
      tr.appendChild(wsTd);

      // ---- Updated cell ----
      const updTd = document.createElement('td');
      updTd.className = 'dim';
      updTd.textContent = MWUI.ago(doc.updated_at);
      tr.appendChild(updTd);

      // ---- Actions cell ----
      const actTd = document.createElement('td');
      actTd.className = 'num';
      const rowActions = document.createElement('span');
      rowActions.className = 'row-actions';

      const openBtn = document.createElement('a');
      openBtn.className = 'ghost-btn sm as-link';
      openBtn.href = '/index.html?doc=' + doc.id;
      openBtn.textContent = 'Open';
      rowActions.appendChild(openBtn);

      if (canEditDoc(doc)) {
        const renBtn = document.createElement('button');
        renBtn.className = 'ghost-btn sm';
        renBtn.textContent = 'Rename';
        renBtn.onclick = () => { renamingId = doc.id; renderDocs(); };
        rowActions.appendChild(renBtn);
      }

      if (canCreateInCompany(doc.company_id)) {
        const dupBtn = document.createElement('button');
        dupBtn.className = 'ghost-btn sm';
        dupBtn.textContent = 'Duplicate';
        dupBtn.onclick = async () => {
          try {
            await MarkwiseAPI.post('/api/docs/' + doc.id + '/duplicate');
            MWUI.toast('Duplicated “' + (doc.title || 'Untitled document') + '”');
            await loadDocs();
          } catch (e) { MWUI.toast(e.message); }
        };
        rowActions.appendChild(dupBtn);
      }

      if (canDeleteDoc(doc)) {
        const delBtn = document.createElement('button');
        if (confirmDelId === doc.id) {
          delBtn.className = 'danger-btn sm solid';
          delBtn.textContent = 'Confirm';
          delBtn.onmouseleave = () => { confirmDelId = null; renderDocs(); };
          delBtn.onclick = async () => {
            const title = doc.title || 'Untitled document';
            try {
              await MarkwiseAPI.del('/api/docs/' + doc.id);
              confirmDelId = null;
              allDocs = allDocs.filter((d) => d.id !== doc.id);
              renderDocs();
              // load trash for undo
              const trash = await MarkwiseAPI.get('/api/docs/trash').catch(() => []);
              trashDocs = trash;
              renderTrash();
              MWUI.toast('Moved “' + title + '” to trash', {
                label: 'Undo',
                fn: async () => {
                  try {
                    await MarkwiseAPI.post('/api/docs/' + doc.id + '/restore');
                    await loadDocs();
                    trashDocs = await MarkwiseAPI.get('/api/docs/trash').catch(() => []);
                    renderTrash();
                  } catch (e) { MWUI.toast(e.message); }
                },
              });
            } catch (e) { MWUI.toast(e.message); }
          };
        } else {
          delBtn.className = 'danger-btn sm';
          delBtn.textContent = 'Delete';
          delBtn.onclick = () => { confirmDelId = doc.id; renderDocs(); };
        }
        rowActions.appendChild(delBtn);
      }

      actTd.appendChild(rowActions);
      tr.appendChild(actTd);
      tbody.appendChild(tr);
    });

    docsBody.appendChild(tbl);
  }

  // -------- COMPANIES SECTION --------
  const coSection = document.createElement('div');
  coSection.className = 'sec';
  main.appendChild(coSection);

  const coSecHead = document.createElement('div');
  coSecHead.className = 'sec-head';
  coSection.appendChild(coSecHead);

  const coSecTitleWrap = document.createElement('div');
  const coSecTitle = document.createElement('h2');
  coSecTitle.className = 'sec-title';
  coSecTitle.textContent = 'Companies';
  coSecTitleWrap.appendChild(coSecTitle);
  const coSecSub = document.createElement('p');
  coSecSub.className = 'sec-sub';
  coSecSub.textContent = (user.memberships || []).length === 0
    ? 'Create a company to collaborate with a team, or join one with an invite link.'
    : 'Manage members, invites, roles, and billing for your teams.';
  coSecTitleWrap.appendChild(coSecSub);
  coSecHead.appendChild(coSecTitleWrap);

  const coGrid = document.createElement('div');
  coGrid.className = 'co-grid';
  coSection.appendChild(coGrid);

  let showNewCoForm = false;

  // the app owner is not a tenant member but oversees every company
  let companyCards = (user.memberships || []).slice();
  if (user.is_app_owner) {
    MarkwiseAPI.get('/api/admin/companies').then((all) => {
      companyCards = all.map((c) => ({
        company_id: c.id,
        company_name: c.name,
        company_plan: c.plan,
        company_status: c.status,
        role: 'App owner',
        member_count: Number(c.member_count) || 0,
      }));
      renderCompanies();
    }).catch(() => {});
  }

  function renderCompanies() {
    coGrid.innerHTML = '';

    companyCards.forEach((m) => {
      const card = document.createElement('a');
      card.className = 'co-card';
      card.href = '/org.html?id=' + m.company_id;

      const avEl = document.createElement('span');
      avEl.innerHTML = MWUI.avatar(m.company_name || 'C', 38);
      // Override default circle avatar to use rounded square style matching co-mark
      const avSpan = avEl.firstChild;
      if (avSpan) {
        avSpan.style.borderRadius = '10px';
      }
      card.appendChild(avEl.firstChild);

      const meta = document.createElement('div');
      meta.className = 'co-meta';
      const nameEl = document.createElement('b');
      nameEl.textContent = m.company_name || ('Company ' + m.company_id);
      meta.appendChild(nameEl);
      const subEl = document.createElement('span');
      subEl.textContent = (m.member_count != null ? m.member_count + (m.member_count === 1 ? ' member · ' : ' members · ') : '') + (m.company_plan || 'free') + ' plan' + (m.company_status === 'suspended' ? ' · suspended' : '');
      meta.appendChild(subEl);
      card.appendChild(meta);

      const roleEl = document.createElement('span');
      roleEl.className = 'co-role';
      roleEl.textContent = user.is_app_owner ? 'App owner' : (m.role || 'Member');
      card.appendChild(roleEl);

      coGrid.appendChild(card);
    });

    // New company card
    if (showNewCoForm) {
      const formCard = document.createElement('div');
      formCard.className = 'co-card form';
      const form = document.createElement('form');
      const inp = document.createElement('input');
      inp.className = 'fld';
      inp.placeholder = 'Company name';
      inp.autofocus = true;
      form.appendChild(inp);
      const createBtn = document.createElement('button');
      createBtn.className = 'primary-btn';
      createBtn.type = 'submit';
      createBtn.textContent = 'Create';
      createBtn.disabled = true;
      inp.oninput = () => { createBtn.disabled = !inp.value.trim(); };
      inp.onkeydown = (e) => {
        if (e.key === 'Escape') { showNewCoForm = false; renderCompanies(); }
      };
      form.appendChild(createBtn);
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'ghost-btn';
      cancelBtn.type = 'button';
      cancelBtn.textContent = 'Cancel';
      cancelBtn.onclick = () => { showNewCoForm = false; renderCompanies(); };
      form.appendChild(cancelBtn);
      form.onsubmit = async (e) => {
        e.preventDefault();
        const name = inp.value.trim();
        if (!name) return;
        try {
          const co = await MarkwiseAPI.post('/api/orgs', { name });
          location.href = '/org.html?id=' + co.id;
        } catch (e2) { MWUI.toast(e2.message); }
      };
      formCard.appendChild(form);
      coGrid.appendChild(formCard);
      setTimeout(() => inp.focus(), 0);
    } else {
      const addCard = document.createElement('button');
      addCard.className = 'co-card add';
      addCard.textContent = '+ New company';
      addCard.onclick = () => { showNewCoForm = true; renderCompanies(); };
      coGrid.appendChild(addCard);
    }
  }

  // -------- TRASH SECTION --------
  const trashSection = document.createElement('div');
  trashSection.className = 'sec';
  trashSection.style.display = 'none';
  main.appendChild(trashSection);

  const trashSecHead = document.createElement('div');
  trashSecHead.className = 'sec-head';
  trashSection.appendChild(trashSecHead);

  const trashSecTitleWrap = document.createElement('div');
  const trashSecTitle = document.createElement('h2');
  trashSecTitle.className = 'sec-title';
  trashSecTitle.textContent = 'Trash';
  trashSecTitleWrap.appendChild(trashSecTitle);
  const trashSecSub = document.createElement('p');
  trashSecSub.className = 'sec-sub';
  trashSecSub.textContent = 'Deleted documents are kept here for 30 days, then removed automatically.';
  trashSecTitleWrap.appendChild(trashSecSub);
  trashSecHead.appendChild(trashSecTitleWrap);

  const trashCard = document.createElement('div');
  trashCard.className = 'card';
  trashSection.appendChild(trashCard);

  function renderTrash() {
    trashSection.style.display = trashDocs.length ? '' : 'none';
    trashCard.innerHTML = '';
    if (!trashDocs.length) return;

    const tbl = document.createElement('table');
    tbl.className = 'tbl';
    tbl.innerHTML =
      '<thead><tr>' +
      '<th>Title</th><th>Workspace</th><th>Deleted</th><th class="num"></th>' +
      '</tr></thead>';
    const tbody = document.createElement('tbody');
    tbl.appendChild(tbody);

    trashDocs.forEach((doc) => {
      const tr = document.createElement('tr');

      const titleTd = document.createElement('td');
      titleTd.className = 'dim';
      titleTd.textContent = doc.title || 'Untitled document';
      tr.appendChild(titleTd);

      const wsTd = document.createElement('td');
      const wsChip = document.createElement('span');
      wsChip.className = 'ws-chip';
      wsChip.textContent = doc.company_id ? (doc.company_name || 'Company ' + doc.company_id) : 'Personal';
      wsTd.appendChild(wsChip);
      tr.appendChild(wsTd);

      const delTd = document.createElement('td');
      delTd.className = 'dim';
      delTd.textContent = MWUI.ago(doc.deleted_at);
      tr.appendChild(delTd);

      const actTd = document.createElement('td');
      actTd.className = 'num';
      const rowActions = document.createElement('span');
      rowActions.className = 'row-actions';

      const restoreBtn = document.createElement('button');
      restoreBtn.className = 'ghost-btn sm';
      restoreBtn.textContent = 'Restore';
      restoreBtn.onclick = async () => {
        try {
          await MarkwiseAPI.post('/api/docs/' + doc.id + '/restore');
          trashDocs = trashDocs.filter((d) => d.id !== doc.id);
          await loadDocs();
          renderTrash();
          MWUI.toast('Restored “' + (doc.title || 'Untitled document') + '”');
        } catch (e) { MWUI.toast(e.message); }
      };
      rowActions.appendChild(restoreBtn);

      const purgeBtn = document.createElement('button');
      purgeBtn.className = 'danger-btn sm';
      purgeBtn.textContent = 'Delete forever';
      purgeBtn.onclick = async () => {
        try {
          await MarkwiseAPI.del('/api/docs/' + doc.id + '/purge');
          trashDocs = trashDocs.filter((d) => d.id !== doc.id);
          renderTrash();
          MWUI.toast('Permanently deleted “' + (doc.title || 'Untitled document') + '”');
        } catch (e) { MWUI.toast(e.message); }
      };
      rowActions.appendChild(purgeBtn);

      actTd.appendChild(rowActions);
      tr.appendChild(actTd);
      tbody.appendChild(tr);
    });

    trashCard.appendChild(tbl);
  }

  // -------- data loading --------
  async function loadDocs() {
    try {
      allDocs = await MarkwiseAPI.get('/api/docs');
    } catch (e) {
      allDocs = [];
      MWUI.toast('Failed to load documents');
    }
    renderDocs();
  }

  // initial load
  await loadDocs();
  renderCompanies();

  // load trash in background
  MarkwiseAPI.get('/api/docs/trash').then((t) => {
    trashDocs = t;
    renderTrash();
  }).catch(() => {});

})();
</script>
</body>
</html>
