<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account settings — Markwise</title>
  <link rel="stylesheet" href="assets/account.css">
</head>
<body>
<script src="app/api.js"></script>
<script src="assets/account.js"></script>
<script>
(async function () {
  const user = await MarkwiseAPI.requireUser();
  if (!user) return;

  const esc = MWUI.esc;
  const ui = MWUI.topbar(user, { back: true });

  // ── main wrapper ────────────────────────────────────────────────────────────
  const main = document.createElement('main');
  main.className = 'wrap settings';
  document.body.appendChild(main);

  // ── account head ────────────────────────────────────────────────────────────
  const companyCount = (user.memberships || []).length;
  const companyLabel = companyCount === 0 ? 'no companies'
    : companyCount === 1 ? '1 company'
    : companyCount + ' companies';

  const head = document.createElement('div');
  head.className = 'acct-head';
  head.innerHTML =
    MWUI.avatar(user.name, 54) +
    '<div class="acct-id">' +
      '<span class="acct-title-row">' +
        '<h1 class="page-title">' + esc(user.name) + '</h1>' +
        (user.is_app_owner ? MWUI.pill('blue', 'App owner') : '') +
      '</span>' +
      '<span class="acct-sub">' + esc(user.email) + ' &middot; ' + esc(companyLabel) + '</span>' +
    '</div>';
  main.appendChild(head);

  // ── settings grid ───────────────────────────────────────────────────────────
  const grid = document.createElement('div');
  grid.className = 'settings-grid';
  main.appendChild(grid);

  // left nav
  const snav = document.createElement('nav');
  snav.className = 'snav';
  grid.appendChild(snav);

  // right body
  const body = document.createElement('div');
  body.className = 'settings-body';
  grid.appendChild(body);

  // ── state ────────────────────────────────────────────────────────────────────
  let currentUser = Object.assign({}, user);
  let pane = 'profile';
  let apiKeys = [];    // loaded when API pane opens
  let keysLoaded = false;
  let newlyCreatedToken = null;  // full token shown once

  // ── nav pane helper ──────────────────────────────────────────────────────────
  function navPanes() {
    const panes = [
      { id: 'profile',       label: 'Profile' },
      { id: 'security',      label: 'Security' },
      { id: 'notifications', label: 'Notifications' },
      { id: 'api',           label: 'API keys', count: apiKeys.length || null },
      { id: 'danger',        label: 'Danger zone', danger: true },
    ];
    snav.innerHTML = panes.map((p) =>
      '<button data-p="' + p.id + '" class="' +
        (pane === p.id ? 'on' : '') +
        (p.danger ? ' danger' : '') + '">' +
        esc(p.label) +
        (p.count != null ? '<span class="count">' + p.count + '</span>' : '') +
      '</button>'
    ).join('');
    snav.querySelectorAll('button').forEach((btn) => {
      btn.onclick = () => { pane = btn.dataset.p; render(); };
    });
  }

  // ── section helper ───────────────────────────────────────────────────────────
  function section(title, sub, actionsHtml, contentHtml) {
    return '<div class="sec">' +
      '<div class="sec-head">' +
        '<div><h2 class="sec-title">' + esc(title) + '</h2>' +
          (sub ? '<p class="sec-sub">' + esc(sub) + '</p>' : '') +
        '</div>' +
        (actionsHtml ? '<div class="sec-actions">' + actionsHtml + '</div>' : '') +
      '</div>' +
      contentHtml +
    '</div>';
  }

  // ── password score ───────────────────────────────────────────────────────────
  function pwScore(p) {
    if (!p) return 0;
    let s = 0;
    if (p.length >= 8) s++;
    if (p.length >= 10) s++;
    if (/[A-Z]/.test(p) && /[0-9]/.test(p)) s++;
    return s;
  }
  function pwMeterHtml(p) {
    if (!p) return '';
    const s = pwScore(p);
    const label = s <= 1 ? 'Weak' : s === 2 ? 'Okay' : 'Strong';
    return '<div class="pw-meter s' + s + '">' +
      '<span class="bars"><i></i><i></i><i></i></span>' +
      '<span class="pw-label">' + esc(label) + '</span>' +
    '</div>';
  }

  // ── notification prefs ───────────────────────────────────────────────────────
  function getNotifPrefs() {
    try { return JSON.parse(localStorage.getItem('mw-notif-prefs') || '{}'); }
    catch { return {}; }
  }
  function saveNotifPrefs(prefs) {
    localStorage.setItem('mw-notif-prefs', JSON.stringify(prefs));
  }
  function prefOn(k) {
    return getNotifPrefs()[k] !== false;
  }
  function togglePref(k) {
    const prefs = getNotifPrefs();
    prefs[k] = !prefOn(k);
    saveNotifPrefs(prefs);
    renderPane();
  }

  // ── key masking ──────────────────────────────────────────────────────────────
  function maskToken(t) { return t.slice(0, 8) + '…' + t.slice(-4); }

  // ── date format ──────────────────────────────────────────────────────────────
  function fmtDate(ts) {
    if (!ts) return '';
    return new Date(ts).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  // ── pane renderers ───────────────────────────────────────────────────────────
  let profileName = currentUser.name;
  let profileEmail = currentUser.email;
  let profileError = '';

  let curPw = '', newPw = '', pwError = '';

  let deleteClickedAt = 0;
  let deleteRevertTimer = null;

  function renderProfile() {
    const dirty = profileName.trim() !== currentUser.name
      || profileEmail.trim().toLowerCase() !== currentUser.email;
    return section(
      'Profile',
      'How you appear to teammates across Markwise.',
      '',
      '<div class="card pad">' +
        '<div class="avatar-row">' +
          MWUI.avatar(profileName.trim() || currentUser.name, 44) +
          '<p>Your avatar uses your initials and a color generated from your name — it updates as you type.</p>' +
        '</div>' +
        '<form id="profileForm">' +
          '<label class="fld-label">Name</label>' +
          '<input class="fld" id="nameInput" type="text" value="' + esc(profileName) + '">' +
          '<label class="fld-label">Email</label>' +
          '<input class="fld" id="emailInput" type="email" value="' + esc(profileEmail) + '">' +
          (profileError ? '<div class="form-error">' + esc(profileError) + '</div>' : '') +
          '<div class="form-foot split">' +
            '<span class="dim foot-hint">' + (dirty ? 'Unsaved changes' : '') + '</span>' +
            '<button class="primary-btn" type="submit"' + (!dirty ? ' disabled' : '') + '>Save profile</button>' +
          '</div>' +
        '</form>' +
      '</div>'
    );
  }

  function renderSecurity() {
    return section('Password', '', '',
      '<div class="card pad">' +
        '<form id="pwForm">' +
          '<label class="fld-label">Current password</label>' +
          '<input class="fld" id="curPwInput" type="password" value="' + esc(curPw) + '" autocomplete="current-password">' +
          '<label class="fld-label">New password</label>' +
          '<input class="fld" id="newPwInput" type="password" value="' + esc(newPw) + '" placeholder="At least 8 characters" autocomplete="new-password">' +
          pwMeterHtml(newPw) +
          (pwError ? '<div class="form-error">' + esc(pwError) + '</div>' : '') +
          '<div class="form-foot">' +
            '<button class="secondary-btn" type="submit"' + (!curPw || !newPw ? ' disabled' : '') + '>Change password</button>' +
          '</div>' +
        '</form>' +
      '</div>'
    ) +
    section('Active session', '', '',
      '<div class="card pad">' +
        '<p style="margin:0;font-size:13px;color:var(--grey)">You’re signed in on this device.</p>' +
      '</div>'
    );
  }

  function renderNotifications() {
    function row(key, title, desc) {
      const on = prefOn(key);
      return '<div class="set-row" data-key="' + esc(key) + '">' +
        '<div><b>' + esc(title) + '</b><p>' + esc(desc) + '</p></div>' +
        '<button class="switch' + (on ? ' on' : '') + '" data-key="' + esc(key) + '" aria-pressed="' + on + '"><span class="knob"></span></button>' +
      '</div>';
    }
    return section('Notifications', 'What shows up in your notification bell.', '',
      '<div class="card pad">' +
        row('invites', 'Invites', 'Invite links created, deleted, or accepted in your companies.') +
        row('roles', 'Members & roles', 'Members joining or leaving, and role changes.') +
        row('billing', 'Billing', 'Plan changes and invoices.') +
      '</div>'
    );
  }

  function renderApiKeys() {
    const keysHtml = apiKeys.length === 0
      ? '<div class="empty-note">No API keys yet. Generate one to use the Markwise API.</div>'
      : '<table class="tbl">' +
          '<thead><tr>' +
            '<th>Key</th>' +
            '<th>Created</th>' +
            '<th class="num"></th>' +
          '</tr></thead>' +
          '<tbody>' +
            apiKeys.map((k) => {
              const isNew = k.id === (newlyCreatedToken && newlyCreatedToken.id);
              const displayToken = isNew ? newlyCreatedToken.fullToken : k.token;
              return '<tr>' +
                '<td>' +
                  '<span class="mono-chip">' + esc(displayToken) + '</span>' +
                  (isNew ? '<span class="dim sm-note"> — visible once</span>' : '') +
                '</td>' +
                '<td class="dim">' + esc(fmtDate(k.created_at)) + '</td>' +
                '<td class="num">' +
                  '<span class="row-actions">' +
                    (isNew ? '<button class="ghost-btn sm" data-copy="' + esc(newlyCreatedToken.fullToken) + '">Copy</button>' : '') +
                    '<button class="danger-btn sm" data-revoke="' + k.id + '">Revoke</button>' +
                  '</span>' +
                '</td>' +
              '</tr>';
            }).join('') +
          '</tbody>' +
        '</table>';

    return section(
      'API keys',
      'For the Markwise API and integrations. Keys act with your permissions.',
      '<button class="secondary-btn" id="genKeyBtn">Generate key</button>',
      '<div class="card">' + keysHtml + '</div>'
    );
  }

  function renderDanger() {
    const isOwner = currentUser.is_app_owner;
    const now = Date.now();
    const inConfirm = !isOwner && deleteClickedAt > 0 && (now - deleteClickedAt) < 4000;
    return section('Danger zone', '', '',
      '<div class="card pad">' +
        '<div class="danger-zone bare">' +
          '<div>' +
            '<b>Delete account</b>' +
            (isOwner
              ? '<p>The app owner account can’t be deleted.</p>'
              : '<p>Removes you from all companies and deletes your personal documents. This can’t be undone.</p>'
            ) +
          '</div>' +
          (isOwner
            ? '<button class="danger-btn" disabled>Delete account</button>'
            : '<button class="danger-btn' + (inConfirm ? ' solid' : '') + '" id="deleteBtn">' +
                (inConfirm ? 'Click again to confirm' : 'Delete account') +
              '</button>'
          ) +
        '</div>' +
      '</div>'
    );
  }

  // ── render pane ──────────────────────────────────────────────────────────────
  function renderPane() {
    let html = '';
    if (pane === 'profile')       html = renderProfile();
    else if (pane === 'security') html = renderSecurity();
    else if (pane === 'notifications') html = renderNotifications();
    else if (pane === 'api')      html = renderApiKeys();
    else if (pane === 'danger')   html = renderDanger();
    body.innerHTML = html;
    wirePane();
  }

  function render() {
    navPanes();
    renderPane();
  }

  // ── wire pane events ─────────────────────────────────────────────────────────
  function wirePane() {
    if (pane === 'profile') {
      const nameInput  = body.querySelector('#nameInput');
      const emailInput = body.querySelector('#emailInput');
      const form       = body.querySelector('#profileForm');
      const avatarRow  = body.querySelector('.avatar-row');

      nameInput.oninput = () => {
        profileName = nameInput.value;
        profileError = '';
        // Live-update avatar
        avatarRow.querySelector('.av').outerHTML; // reference
        const avEl = avatarRow.querySelector('.av');
        if (avEl) {
          const tmp = document.createElement('div');
          tmp.innerHTML = MWUI.avatar(profileName.trim() || currentUser.name, 44);
          avEl.replaceWith(tmp.firstChild);
        }
        // Update hint + button state
        const dirty = profileName.trim() !== currentUser.name
          || profileEmail.trim().toLowerCase() !== currentUser.email;
        const hint = body.querySelector('.foot-hint');
        const btn  = body.querySelector('.primary-btn');
        if (hint) hint.textContent = dirty ? 'Unsaved changes' : '';
        if (btn)  btn.disabled = !dirty;
      };

      emailInput.oninput = () => {
        profileEmail = emailInput.value;
        profileError = '';
        const dirty = profileName.trim() !== currentUser.name
          || profileEmail.trim().toLowerCase() !== currentUser.email;
        const hint = body.querySelector('.foot-hint');
        const btn  = body.querySelector('.primary-btn');
        if (hint) hint.textContent = dirty ? 'Unsaved changes' : '';
        if (btn)  btn.disabled = !dirty;
      };

      form.onsubmit = async (e) => {
        e.preventDefault();
        const nm = profileName.trim();
        const em = profileEmail.trim().toLowerCase();
        if (!nm) { profileError = 'Name can’t be empty.'; renderPane(); return; }
        if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(em)) { profileError = 'Please enter a valid email.'; renderPane(); return; }
        const btn = body.querySelector('.primary-btn');
        if (btn) btn.disabled = true;
        try {
          const updated = await MarkwiseAPI.put('/api/auth/me', { name: nm, email: em });
          currentUser.name = updated.name;
          currentUser.email = updated.email;
          profileName  = updated.name;
          profileEmail = updated.email;
          profileError = '';
          MWUI.toast('Profile saved');
          render();
        } catch (err) {
          profileError = err.message || 'Failed to save profile.';
          renderPane();
        }
      };
    }

    if (pane === 'security') {
      const curInput = body.querySelector('#curPwInput');
      const newInput = body.querySelector('#newPwInput');
      const form     = body.querySelector('#pwForm');

      curInput.oninput = () => {
        curPw = curInput.value;
        pwError = '';
        const btn = body.querySelector('.secondary-btn');
        if (btn) btn.disabled = !curPw || !newPw;
      };

      newInput.oninput = () => {
        newPw = newInput.value;
        pwError = '';
        // Update pw meter inline
        const meterWrap = body.querySelector('.pw-meter');
        const tmp = document.createElement('div');
        tmp.innerHTML = pwMeterHtml(newPw);
        if (meterWrap) {
          meterWrap.replaceWith(tmp.firstChild || document.createTextNode(''));
        } else if (tmp.firstChild) {
          newInput.insertAdjacentElement('afterend', tmp.firstChild);
        }
        const btn = body.querySelector('.secondary-btn');
        if (btn) btn.disabled = !curPw || !newPw;
      };

      form.onsubmit = async (e) => {
        e.preventDefault();
        const btn = body.querySelector('.secondary-btn');
        if (btn) btn.disabled = true;
        try {
          await MarkwiseAPI.put('/api/auth/password', { current: curPw, password: newPw });
          curPw = ''; newPw = ''; pwError = '';
          MWUI.toast('Password changed');
          renderPane();
        } catch (err) {
          pwError = err.message || 'Failed to change password.';
          renderPane();
        }
      };
    }

    if (pane === 'notifications') {
      body.querySelectorAll('.switch[data-key]').forEach((btn) => {
        btn.onclick = () => togglePref(btn.dataset.key);
      });
    }

    if (pane === 'api') {
      const genBtn = body.querySelector('#genKeyBtn');
      if (genBtn) {
        genBtn.onclick = async () => {
          genBtn.disabled = true;
          try {
            const key = await MarkwiseAPI.post('/api/auth/keys');
            // Server returns full token once
            newlyCreatedToken = { id: key.id, fullToken: key.token };
            apiKeys.unshift({ id: key.id, token: maskToken(key.token), created_at: key.created_at });
            MWUI.toast('API key created — copy it now');
            render();
          } catch (err) {
            MWUI.toast(err.message || 'Failed to create key');
            genBtn.disabled = false;
          }
        };
      }

      body.querySelectorAll('[data-copy]').forEach((btn) => {
        btn.onclick = () => MWUI.copy(btn.dataset.copy, 'API key copied');
      });

      body.querySelectorAll('[data-revoke]').forEach((btn) => {
        btn.onclick = async () => {
          const id = Number(btn.dataset.revoke);
          btn.disabled = true;
          try {
            await MarkwiseAPI.del('/api/auth/keys/' + id);
            if (newlyCreatedToken && newlyCreatedToken.id === id) newlyCreatedToken = null;
            apiKeys = apiKeys.filter((k) => k.id !== id);
            MWUI.toast('API key revoked');
            render();
          } catch (err) {
            MWUI.toast(err.message || 'Failed to revoke key');
            btn.disabled = false;
          }
        };
      });
    }

    if (pane === 'danger') {
      const deleteBtn = body.querySelector('#deleteBtn');
      if (deleteBtn) {
        deleteBtn.onclick = async () => {
          const now = Date.now();
          const inConfirm = deleteClickedAt > 0 && (now - deleteClickedAt) < 4000;
          if (!inConfirm) {
            deleteClickedAt = now;
            clearTimeout(deleteRevertTimer);
            deleteRevertTimer = setTimeout(() => { deleteClickedAt = 0; renderPane(); }, 4000);
            renderPane();
          } else {
            deleteBtn.disabled = true;
            try {
              await MarkwiseAPI.del('/api/auth/me');
              location.href = '/login.html';
            } catch (err) {
              MWUI.toast(err.message || 'Failed to delete account');
              deleteBtn.disabled = false;
              deleteClickedAt = 0;
              renderPane();
            }
          }
        };
      }
    }
  }

  // ── load API keys then render ─────────────────────────────────────────────────
  // Pre-fetch keys count for the nav badge; will reload when pane opens
  MarkwiseAPI.get('/api/auth/keys').then((keys) => {
    apiKeys = keys;
    keysLoaded = true;
    render();
  }).catch(() => { render(); });

  // Initial render (keys not loaded yet, count will be 0 until they load)
  render();

})();
</script>
</body>
</html>
