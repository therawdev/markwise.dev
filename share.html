<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Shared document — Markwise</title>
<link rel="stylesheet" href="/assets/account.css">
<style>
  .share-main { max-width: 820px; margin: 32px auto 90px; padding: 0 22px; }
  .doc-sheet {
    background: var(--surface); border: 1px solid var(--hairline); border-radius: 16px;
    box-shadow: 0 1px 2px rgba(30,28,24,.04), 0 18px 50px -28px rgba(30,28,24,.14);
    padding: 44px 52px 52px;
  }
  .doc-title { font-size: 30px; font-weight: 700; letter-spacing: -0.6px; margin: 0 0 7px; }
  .doc-meta { color: var(--grey); font-size: 12.5px; margin-bottom: 26px; }
  .doc-body h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; margin: 30px 0 10px; }
  .doc-body h2 { font-size: 19px; font-weight: 700; letter-spacing: -0.3px; margin: 26px 0 8px; }
  .doc-body h3 { font-size: 16px; font-weight: 700; margin: 22px 0 6px; }
  .doc-body p { font-size: 15px; line-height: 1.7; margin: 10px 0; color: #33302b; }
  .doc-body blockquote {
    margin: 14px 0; padding: 4px 0 4px 16px; border-left: 3px solid var(--accent);
    color: var(--grey); font-style: italic;
  }
  .vis-block { margin: 24px auto; min-width: 240px; }
  .vis-block svg { display: block; width: 100%; height: auto; }
  .state { text-align: center; color: var(--grey); padding: 90px 0; font-size: 14px; }
  .footer-note { text-align: center; color: var(--grey); font-size: 12px; margin-top: 26px; }
  .footer-note a { text-decoration: none; font-weight: 600; }
  @media (max-width: 640px) {
    .share-main { padding: 0 12px; }
    .doc-sheet { padding: 28px 22px 34px; border-radius: 12px; }
  }
</style>
</head>
<body>
<header class="topbar">
  <a class="brand" href="/login"><span class="brand-mark"></span><span class="brand-name">Markwise</span></a>
  <div class="topbar-right">
    <span class="pill grey">Shared · read-only</span>
    <a class="primary-btn as-link" href="/signup">Try Markwise</a>
  </div>
</header>
<main class="share-main"><div id="root"><div class="state">Loading document…</div></div></main>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Diagram rendering stack — same order as index.html (interact overrides Diagram from diagrams-b) -->
<script type="text/babel" src="/app/draw.jsx"></script>
<script type="text/babel" src="/app/icons.jsx"></script>
<script type="text/babel" src="/app/diagrams-a.jsx"></script>
<script type="text/babel" src="/app/diagrams-b.jsx"></script>
<script type="text/babel" src="/app/diagrams-c.jsx"></script>
<script type="text/babel" src="/app/diagrams-d.jsx"></script>
<script type="text/babel" src="/app/diagrams-e.jsx"></script>
<script type="text/babel" src="/app/diagrams-g.jsx"></script>
<script type="text/babel" src="/app/diagrams-h.jsx"></script>
<script type="text/babel" src="/app/diagrams-i.jsx"></script>
<script type="text/babel" src="/app/diagrams-j.jsx"></script>
<script type="text/babel" src="/app/diagrams-k.jsx"></script>
<script type="text/babel" src="/app/diagrams-l.jsx"></script>
<script type="text/babel" src="/app/diagrams-f.jsx"></script>
<script type="text/babel" src="/app/interact.jsx"></script>

<script type="text/babel" src="/app/share.jsx"></script>
</body>
</html>
