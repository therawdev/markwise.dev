<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — Markwise</title>
<link rel="stylesheet" href="assets/account.css">
</head>
<body>
<script src="app/api.js"></script>
<script src="assets/account.js"></script>
<script>
(async function () {
  const user = await MarkwiseAPI.requireUser();
  if (!user) return;
  if (!user.is_app_owner) { location.href = '/docs.html'; return; }

  // ---- mount topbar ----
  MWUI.topbar(user, { back: true });

  // ---- page scaffold ----
  const main = document.createElement('main');
  main.className = 'wrap';
  document.body.appendChild(main);

  main.innerHTML =
    '<div class="page-head"><h1 class="page-title">Application owner panel</h1></div>' +
    '<div id="adminTabs"></div>' +
    '<div id="adminContent"></div>';

  // ---- state ----
  let stats = null;
  let users = [];
  let companies = [];
  let auditLogs = [];
  let usageDaily = [];
  let platformFlags = { allow_signups: true, maintenance: false };
  let tab = 'overview';
  const esc = MWUI.esc;
  let auditFilter = '';

  // ---- tab definitions (counts updated after load) ----
  const tabDefs = () => [
    { id: 'overview',   label: 'Overview' },
    { id: 'ai',        label: 'AI provider' },
    { id: 'users',     label: 'Users',     count: users.length },
    { id: 'companies', label: 'Companies', count: companies.length },
    { id: 'platform',  label: 'Platform' },
    { id: 'audit',     label: 'Audit log', count: auditLogs.length },
  ];

  // ---- create tab widget ----
  const tabHost = document.getElementById('adminTabs');
  const tabCtrl = MWUI.tabs(tabHost, tabDefs(), (v) => { tab = v; renderContent(); });

  // ---- load all data ----
  const [s, u, co, al, ud, pf] = await Promise.all([
    MarkwiseAPI.get('/api/admin/stats'),
    MarkwiseAPI.get('/api/admin/users'),
    MarkwiseAPI.get('/api/admin/companies'),
    MarkwiseAPI.get('/api/admin/audit?limit=500'),
    MarkwiseAPI.get('/api/admin/ai-usage-daily'),
    MarkwiseAPI.get('/api/admin/platform'),
  ]);
  stats = s;
  users = u;
  companies = co;
  auditLogs = al;
  usageDaily = ud;
  platformFlags = pf;

  // refresh tab counts
  tabCtrl.update(tabDefs());
  renderContent();

  // ---- helpers ----
  function fmtDetail(d) {
    if (typeof d === 'string') { try { d = JSON.parse(d); } catch (e) { return esc(d); } }
    if (!d || typeof d !== 'object') return '';
    return Object.entries(d).map(([k, v]) => esc(k) + ': ' + esc(String(v))).join(' · ');
  }

  function fmtWhen(ts) {
    try { return new Date(ts).toLocaleString(); } catch(e) { return String(ts); }
  }

  function switchHtml(id, on) {
    return '<button type="button" class="switch' + (on ? ' on' : '') + '" id="' + id + '" role="switch" aria-checked="' + on + '"><span class="knob"></span></button>';
  }

  // ---- overview chart ----
  function buildChart() {
    // Build last-14-days array filled with zeros
    const days = [];
    for (let i = 13; i >= 0; i--) {
      const dt = new Date(Date.now() - i * 86400000);
      const key = dt.toISOString().slice(0, 10);
      const label = dt.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit' });
      days.push({ key, label, n: 0 });
    }
    usageDaily.forEach((row) => {
      const d = days.find((d) => d.key === row.day || d.key === String(row.day).slice(0, 10));
      if (d) d.n = row.n;
    });
    const max = Math.max(1, ...days.map((d) => d.n));
    const total = days.reduce((s, d) => s + d.n, 0);
    const cols = days.map((d, i) =>
      '<div class="col" title="' + esc(d.label) + ' · ' + d.n + ' calls">' +
        '<i style="height:' + Math.max(4, Math.round(d.n / max * 100)) + '%"></i>' +
        '<span>' + (i % 3 === 0 ? esc(d.label) : '') + '</span>' +
      '</div>'
    ).join('');
    return '<div class="card chart-card">' +
      '<div class="chart-head"><b>AI calls — last 14 days</b><span class="dim">' + total + ' total</span></div>' +
      '<div class="chart">' + cols + '</div>' +
    '</div>';
  }

  // ---- section wrapper ----
  function section(title, sub, actionsHtml, bodyHtml) {
    return '<div class="sec">' +
      '<div class="sec-head">' +
        '<div><h2 class="sec-title">' + esc(title) + '</h2>' +
          (sub ? '<p class="sec-sub">' + esc(sub) + '</p>' : '') +
        '</div>' +
        (actionsHtml ? '<div class="sec-actions">' + actionsHtml + '</div>' : '') +
      '</div>' +
      bodyHtml +
    '</div>';
  }

  // ---- render overview ----
  function renderOverview() {
    const st = stats || {};
    const statCards = [
      { n: st.users || 0, label: 'Users' },
      { n: st.companies || 0, label: 'Companies' },
      { n: st.documents || 0, label: 'Documents' },
      { n: st.ai_calls || 0, label: 'AI calls' },
    ];
    let html = '<div class="stat-grid">';
    statCards.forEach((s) => {
      html += '<div class="card stat-card"><div class="stat-num">' + esc(String(s.n)) + '</div><div class="stat-label">' + esc(s.label) + '</div></div>';
    });
    html += '</div>';

    html += section('Usage', null, null, buildChart());

    const recentRows = auditLogs.slice(0, 6).map((e) =>
      '<tr>' +
        '<td class="dim nowrap">' + esc(fmtWhen(e.created_at)) + '</td>' +
        '<td class="nowrap">' + esc(e.actor_email || '—') + '</td>' +
        '<td><span class="mono-chip">' + esc(e.action) + '</span></td>' +
        '<td class="dim">' + fmtDetail(e.detail) + '</td>' +
      '</tr>'
    ).join('') || '<tr><td colspan="4" class="empty-note" style="text-align:left">No activity yet.</td></tr>';

    const latestBody = '<div class="card"><table class="tbl audit"><tbody>' + recentRows + '</tbody></table></div>';
    html += section('Latest activity', null, '<button class="ghost-btn sm" id="openAuditBtn">Open audit log</button>', latestBody);

    document.getElementById('adminContent').innerHTML = html;
    const openBtn = document.getElementById('openAuditBtn');
    if (openBtn) openBtn.onclick = () => tabCtrl.set('audit');
  }

  // ---- render AI provider ----
  function renderAI() {
    const providers = (stats && stats.ai && stats.ai.providers) ? stats.ai.providers : [];
    // Determine if claude sdk is available (ok=true for its row)
    const claudeRow = providers.find((p) => p.id === 'claude');
    const claudeEnabled = claudeRow ? claudeRow.ok : false;

    let rows = providers.map((p) => {
      const on = p.active;
      const disabled = !p.ok;
      return '<button class="prov-row' + (on ? ' on' : '') + (disabled ? ' off' : '') + '"' +
        (disabled ? ' disabled' : '') +
        ' data-provid="' + esc(p.id) + '">' +
        '<span class="radio' + (on ? ' on' : '') + '"></span>' +
        '<span class="prov-text"><b>' + esc(p.label || p.id) + '</b>' +
          (p.reason ? '<small>' + esc(p.reason) + '</small>' : '') +
        '</span>' +
        (on ? MWUI.pill('green', 'Active') : '') +
        (disabled ? MWUI.pill('grey', 'Unavailable') : '') +
      '</button>';
    }).join('');

    // Claude SDK enable-box
    const enableBoxBtn = claudeEnabled
      ? '<button class="ghost-btn" id="claudeSdkBtn">Disable Claude SDK</button>'
      : '<button class="ghost-btn" id="claudeSdkBtn">Enable Claude SDK</button>';

    rows += '<div class="enable-box">' +
      '<div><b>Enable Claude SDK / Claude API</b>' +
        '<p>Enabling also requires ANTHROPIC_API_KEY set on the server.</p>' +
      '</div>' +
      switchHtml('claudeSdkSwitch', claudeEnabled) +
    '</div>';

    const body = '<div class="prov-list">' + rows + '</div>';
    const html = section('AI provider', 'Which engine generates visuals for every workspace.', null, body);
    document.getElementById('adminContent').innerHTML = html;

    // wire provider row clicks
    document.querySelectorAll('.prov-row:not([disabled])').forEach((btn) => {
      btn.onclick = async () => {
        const id = btn.dataset.provid;
        try {
          await MarkwiseAPI.put('/api/admin/ai-provider', { provider: id });
          MWUI.toast('AI provider set to ' + id);
          stats = await MarkwiseAPI.get('/api/admin/stats');
          renderAI();
        } catch (e) { MWUI.toast(e.message); }
      };
    });

    // wire claude sdk switch
    const sdkSwitch = document.getElementById('claudeSdkSwitch');
    if (sdkSwitch) {
      sdkSwitch.onclick = async () => {
        const cur = sdkSwitch.classList.contains('on');
        const next = !cur;
        try {
          await MarkwiseAPI.put('/api/admin/claude-enabled', { enabled: next });
          MWUI.toast(next ? 'Claude SDK enabled' : 'Claude SDK disabled');
          stats = await MarkwiseAPI.get('/api/admin/stats');
          renderAI();
        } catch (e) { MWUI.toast(e.message); }
      };
    }
  }

  // ---- render users ----
  let userQ = '';
  function renderUsers() {
    const q = userQ.trim().toLowerCase();
    const filtered = q ? users.filter((u) => (u.name + ' ' + u.email).toLowerCase().includes(q)) : users;

    const actionsHtml = '<input class="fld sel wide" id="userSearch" placeholder="Search users…" value="' + esc(userQ) + '">';

    let tableHtml;
    if (filtered.length === 0) {
      tableHtml = '<div class="card"><div class="empty-note">No users match "' + esc(userQ) + '".</div></div>';
    } else {
      const rows = filtered.map((u) =>
        '<tr>' +
          '<td class="dim">' + esc(String(u.id)) + '</td>' +
          '<td><span class="member-cell">' + MWUI.avatar(u.name, 26) + '<b>' + esc(u.name) + '</b>' +
            (u.id === user.id ? '<span class="dim"> (you)</span>' : '') +
          '</span></td>' +
          '<td class="dim">' + esc(u.email) + '</td>' +
          '<td>' + (u.is_app_owner ? 'App owner' : 'User') + '</td>' +
          '<td>' + MWUI.pill(u.status === 'active' ? 'green' : 'red', u.status === 'active' ? 'Active' : 'Suspended') + '</td>' +
          '<td class="num">' + (u.is_app_owner ? '' :
            '<span class="row-actions">' +
              (u.status === 'active' ? '<button class="ghost-btn sm u-imp" data-id="' + u.id + '" data-email="' + esc(u.email) + '">Sign in as</button>' : '') +
              (u.status === 'active'
                ? '<button class="danger-btn sm u-status" data-id="' + u.id + '" data-target="suspended" data-email="' + esc(u.email) + '">Suspend</button>'
                : '<button class="ghost-btn sm u-status" data-id="' + u.id + '" data-target="active" data-email="' + esc(u.email) + '">Activate</button>') +
            '</span>'
          ) + '</td>' +
        '</tr>'
      ).join('');
      tableHtml = '<div class="card"><table class="tbl">' +
        '<thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Type</th><th>Status</th><th class="num"></th></tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
        '</table></div>';
    }

    document.getElementById('adminContent').innerHTML = section('Users', null, actionsHtml, tableHtml);

    document.getElementById('userSearch').oninput = (e) => {
      userQ = e.target.value;
      renderUsers();
    };

    document.querySelectorAll('.u-imp').forEach((btn) => {
      btn.onclick = async () => {
        try {
          await MarkwiseAPI.post('/api/admin/impersonate/' + btn.dataset.id, {});
          location.href = '/docs.html';
        } catch (e) { MWUI.toast(e.message); }
      };
    });

    document.querySelectorAll('.u-status').forEach((btn) => {
      btn.onclick = async () => {
        const id = btn.dataset.id;
        const target = btn.dataset.target;
        const email = btn.dataset.email;
        try {
          await MarkwiseAPI.put('/api/admin/users/' + id + '/status', { status: target });
          MWUI.toast((target === 'suspended' ? 'Suspended ' : 'Activated ') + email);
          users = await MarkwiseAPI.get('/api/admin/users');
          tabCtrl.update(tabDefs());
          renderUsers();
        } catch (e) { MWUI.toast(e.message); }
      };
    });
  }

  // ---- render companies ----
  let coQ = '';
  let newCoName = '';
  function renderCompanies() {
    const q = coQ.trim().toLowerCase();
    const filtered = q ? companies.filter((c) => c.name.toLowerCase().includes(q)) : companies;

    const actionsHtml =
      '<input class="fld sel" id="coSearch" placeholder="Search…" value="' + esc(coQ) + '">' +
      '<input class="fld sel wide" id="newCoInput" placeholder="New company name" value="' + esc(newCoName) + '">' +
      '<button class="secondary-btn" id="createCoBtn"' + (newCoName.trim() ? '' : ' disabled') + '>Create company</button>';

    let tableHtml;
    if (filtered.length === 0) {
      tableHtml = '<div class="card"><div class="empty-note">No companies match "' + esc(coQ) + '".</div></div>';
    } else {
      const rows = filtered.map((c) =>
        '<tr>' +
          '<td class="dim">' + esc(String(c.id)) + '</td>' +
          '<td><a class="member-cell as-link" href="/org.html?id=' + c.id + '" style="gap:10px">' +
            MWUI.avatar(c.name, 26) + '<b>' + esc(c.name) + '</b>' +
          '</a></td>' +
          '<td>' + esc(c.plan || 'free') + '</td>' +
          '<td>' + esc(String(c.member_count || 0)) + '</td>' +
          '<td>' + MWUI.pill(c.status === 'active' ? 'green' : 'red', c.status === 'active' ? 'Active' : 'Suspended') + '</td>' +
          '<td class="num"><span class="row-actions">' +
            '<a class="ghost-btn sm as-link" href="/org.html?id=' + c.id + '">Settings</a>' +
            (c.status === 'active'
              ? '<button class="danger-btn sm co-status" data-id="' + c.id + '" data-target="suspended" data-name="' + esc(c.name) + '">Suspend</button>'
              : '<button class="ghost-btn sm co-status" data-id="' + c.id + '" data-target="active" data-name="' + esc(c.name) + '">Activate</button>') +
          '</span></td>' +
        '</tr>'
      ).join('');
      tableHtml = '<div class="card"><table class="tbl">' +
        '<thead><tr><th>ID</th><th>Name</th><th>Plan</th><th>Members</th><th>Status</th><th class="num"></th></tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
        '</table></div>';
    }

    document.getElementById('adminContent').innerHTML = section('Companies', null, actionsHtml, tableHtml);

    document.getElementById('coSearch').oninput = (e) => {
      coQ = e.target.value;
      renderCompanies();
    };

    const newCoInput = document.getElementById('newCoInput');
    const createCoBtn = document.getElementById('createCoBtn');

    newCoInput.oninput = (e) => {
      newCoName = e.target.value;
      createCoBtn.disabled = !newCoName.trim();
    };

    newCoInput.onkeydown = (e) => {
      if (e.key === 'Enter' && newCoName.trim()) doCreateCo();
    };

    createCoBtn.onclick = doCreateCo;

    async function doCreateCo() {
      const nm = newCoName.trim();
      if (!nm) return;
      try {
        await MarkwiseAPI.post('/api/orgs', { name: nm });
        MWUI.toast('Company "' + nm + '" created');
        newCoName = '';
        companies = await MarkwiseAPI.get('/api/admin/companies');
        tabCtrl.update(tabDefs());
        renderCompanies();
      } catch (e) { MWUI.toast(e.message); }
    }

    document.querySelectorAll('.co-status').forEach((btn) => {
      btn.onclick = async () => {
        const id = btn.dataset.id;
        const target = btn.dataset.target;
        const name = btn.dataset.name;
        try {
          await MarkwiseAPI.put('/api/admin/companies/' + id + '/status', { status: target });
          MWUI.toast((target === 'suspended' ? 'Suspended ' : 'Activated ') + name);
          companies = await MarkwiseAPI.get('/api/admin/companies');
          tabCtrl.update(tabDefs());
          renderCompanies();
        } catch (e) { MWUI.toast(e.message); }
      };
    });
  }

  // ---- render platform ----
  function renderPlatform() {
    const rows =
      '<div class="set-row">' +
        '<div><b>Allow public signups</b>' +
          '<p>When off, new accounts can only be created through invite links.</p>' +
        '</div>' +
        switchHtml('switchSignups', platformFlags.allow_signups) +
      '</div>' +
      '<div class="set-row">' +
        '<div><b>Maintenance mode</b>' +
          '<p>Shows a banner to every non-admin user while you make changes.</p>' +
        '</div>' +
        switchHtml('switchMaint', platformFlags.maintenance) +
      '</div>';

    const html = section('Platform settings', 'Global switches that apply to every user and company.', null,
      '<div class="card pad">' + rows + '</div>');

    document.getElementById('adminContent').innerHTML = html;

    document.getElementById('switchSignups').onclick = async () => {
      const next = !platformFlags.allow_signups;
      try {
        await MarkwiseAPI.put('/api/admin/platform', { allow_signups: next });
        platformFlags.allow_signups = next;
        MWUI.toast(next ? 'Public signups enabled' : 'Public signups disabled');
        renderPlatform();
      } catch (e) { MWUI.toast(e.message); }
    };

    document.getElementById('switchMaint').onclick = async () => {
      const next = !platformFlags.maintenance;
      try {
        await MarkwiseAPI.put('/api/admin/platform', { maintenance: next });
        platformFlags.maintenance = next;
        MWUI.toast(next ? 'Maintenance mode on' : 'Maintenance mode off');
        renderPlatform();
      } catch (e) { MWUI.toast(e.message); }
    };
  }

  // ---- render audit ----
  function renderAudit() {
    const f = auditFilter.trim().toLowerCase();
    const filtered = f
      ? auditLogs.filter((e) => (String(e.actor_email || '') + ' ' + e.action + ' ' + String(e.target || '') + ' ' + JSON.stringify(e.detail || '')).toLowerCase().includes(f))
      : auditLogs;

    const actionsHtml =
      '<input class="fld sel wide" id="auditFilter" placeholder="Filter events…" value="' + esc(auditFilter) + '">' +
      '<button class="secondary-btn" id="exportCsvBtn">Export CSV</button>';

    const rows = filtered.map((e) =>
      '<tr>' +
        '<td class="dim nowrap">' + esc(fmtWhen(e.created_at)) + '</td>' +
        '<td class="nowrap">' + esc(e.actor_email || '—') + '</td>' +
        '<td><span class="mono-chip">' + esc(e.action) + '</span></td>' +
        '<td class="dim nowrap">' + esc(String(e.target || '')) + '</td>' +
        '<td class="dim">' + fmtDetail(e.detail) + '</td>' +
      '</tr>'
    ).join('') || '<tr><td colspan="5" class="dim" style="padding:14px 16px">No events match "' + esc(auditFilter) + '".</td></tr>';

    const sub = filtered.length + ' of ' + auditLogs.length + ' events';
    const tableHtml = '<div class="card audit-scroll"><table class="tbl audit">' +
      '<thead><tr><th>When</th><th>Actor</th><th>Action</th><th>Target</th><th>Details</th></tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
      '</table></div>';

    document.getElementById('adminContent').innerHTML = section('Audit log', sub, actionsHtml, tableHtml);

    document.getElementById('auditFilter').oninput = (e) => {
      auditFilter = e.target.value;
      renderAudit();
    };

    document.getElementById('exportCsvBtn').onclick = () => {
      const headers = ['When', 'Actor', 'Action', 'Target', 'Details'];
      const q2 = (v) => '"' + String(v == null ? '' : v).replace(/"/g, '""') + '"';
      const csvRows = [headers.map(q2).join(',')]
        .concat(filtered.map((e) => [
          fmtWhen(e.created_at),
          e.actor_email || '',
          e.action,
          e.target || '',
          typeof e.detail === 'object' ? JSON.stringify(e.detail || '') : (e.detail || ''),
        ].map(q2).join(',')));
      const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'markwise-audit-log.csv';
      a.click();
      MWUI.toast('Audit log exported as CSV');
    };
  }

  // ---- main render switch ----
  function renderContent() {
    switch (tab) {
      case 'overview':   renderOverview(); break;
      case 'ai':         renderAI(); break;
      case 'users':      renderUsers(); break;
      case 'companies':  renderCompanies(); break;
      case 'platform':   renderPlatform(); break;
      case 'audit':      renderAudit(); break;
    }
  }

  renderContent();
})();
</script>
</body>
</html>
